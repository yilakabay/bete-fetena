<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bete Fetena - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --bg-body: #f4f1eb;
            --bg-sidebar: #fdfaf5;
            --sidebar-text: #0a0a0a;
            --text-primary: #0a0a0a;
            --text-secondary: #5a5a5a;
            --card-bg: #ffffff;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-nav: 0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
            --btn-bg: #00008B;
            --gold: #FFA500;
            --navy: #00008B;
            --cat-bg: #f0ece3;
            --option-bg: #e8e3d8;
            --border-light: rgba(0,0,0,0.08);
            --grain-opacity: 0.03;
            --navbar-bg: rgba(255,255,255,0.96);
        }

        body.dark {
            --bg-body: #0e0c08;
            --bg-sidebar: #141209;
            --sidebar-text: #f5e6c8;
            --text-primary: #f0e8d0;
            --text-secondary: #9a8f78;
            --card-bg: #1a1710;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-nav: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
            --btn-bg: #FFA500;
            --gold: #FFA500;
            --navy: #4d6fff;
            --cat-bg: #1e1b12;
            --option-bg: #222017;
            --border-light: rgba(255,255,255,0.07);
            --grain-opacity: 0.05;
            --navbar-bg: rgba(22,19,13,0.97);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9998;
        }

        .top-nav {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--navbar-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-nav);
            border: 1px solid var(--border-light);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: background 0.4s, box-shadow 0.4s;
        }

        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
        .nav-right { display: flex; align-items: center; gap: 8px; }

        .menu-btn {
            background: none; border: none; cursor: pointer;
            padding: 6px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .menu-btn:hover { background: rgba(0,0,139,0.07); }
        .menu-btn img { width: 22px; height: 22px; }

        .nav-logo-img { height: 30px; width: auto; }

        .nav-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--navy);
            letter-spacing: -0.01em;
            line-height: 1;
        }
        body.dark .nav-brand { color: var(--gold); }

        .nav-tagline {
            font-size: 0.6rem;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: none;
        }

        .cta-nav-btn {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s, opacity 0.2s;
            letter-spacing: 0.01em;
        }
        .cta-nav-btn:hover { transform: translateY(-1px); opacity: 0.9; }

        .page-content {
            padding-top: 80px;
            padding-left: 0;
            padding-right: 0;
        }

        .sidebar {
            height: 100%; width: 0; position: fixed;
            top: 0; left: 0;
            background: var(--bg-sidebar);
            overflow-x: hidden;
            transition: 0.3s cubic-bezier(0.4,0,0.2,1);
            padding-top: 0;
            z-index: 2000;
            box-shadow: 4px 0 40px rgba(0,0,0,0.15);
            border-right: 1px solid var(--border-light);
        }

        .sidebar-user-header {
            padding: 40px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            min-height: 160px;
        }

        .sidebar-user-header.plan-free {
            background: linear-gradient(160deg, #1B2F5E 0%, #00008B 100%);
        }
        .sidebar-user-header.plan-zgju {
            background: linear-gradient(160deg, #1a1f3c 0%, #0d1130 100%);
            border-bottom: 2px solid rgba(255,165,0,0.4);
        }
        .sidebar-user-header.plan-qeleme {
            background: linear-gradient(160deg, #0c0a06 0%, #1a1400 100%);
            border-bottom: 2px solid rgba(255,215,0,0.5);
        }

        .sidebar-user-header::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at top right, rgba(255,255,255,0.07), transparent 60%);
            pointer-events: none;
        }

        .sidebar-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
        }

        .sidebar-username {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            line-height: 1.3;
        }

        .sidebar-plan-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 12px;
            border-radius: 20px;
        }

        .badge-free { background: rgba(255,255,255,0.15); color: #d0e0ff; }
        .badge-zgju { background: rgba(255,165,0,0.2); color: #FFA500; border: 1px solid rgba(255,165,0,0.35); }
        .badge-qeleme { background: rgba(255,215,0,0.15); color: #FFD700; border: 1px solid rgba(255,215,0,0.4); }

        .sidebar a {
            padding: 13px 24px;
            text-decoration: none;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: var(--sidebar-text);
            display: flex; align-items: center;
            transition: background 0.15s, padding-left 0.2s;
            letter-spacing: 0.01em;
        }
        .sidebar a:hover { background: rgba(0,0,139,0.05); padding-left: 30px; }
        body.dark .sidebar a:hover { background: rgba(255,165,0,0.06); }

        .sidebar .closebtn {
            position: absolute; top: 14px; right: 18px;
            font-size: 24px; color: rgba(255,255,255,0.7);
            padding: 4px 8px !important;
            cursor: pointer; z-index: 10;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            border: none;
            line-height: 1;
        }
        .sidebar .closebtn:hover { color: white !important; background: rgba(255,255,255,0.2) !important; padding-left: 8px !important; }

        .sidebar-nav-links { padding: 8px 0; }

        .sidebar .logout {
            color: #e05555;
            margin-top: 8px;
            border-top: 1px solid var(--border-light);
        }
        .sidebar .logout:hover { background: rgba(224,85,85,0.06) !important; }

        .main { padding: 0; }
        .content-area { padding: 0 14px 40px; }

        .hero-container {
            position: relative;
            width: calc(100% + 28px);
            margin-left: -14px;
            overflow: hidden;
        }
        .hero-image { width: 100%; height: auto; display: block; }
        .hero-container::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }
        .hero-text {
            position: absolute; bottom: 6%; left: 0; right: 0;
            text-align: center; color: white;
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.7);
            padding: 0 20px;
            z-index: 2;
            line-height: 1.4;
        }

        .cta-strip {
            text-align: center;
            padding: 22px 0 18px;
            position: relative;
        }
        .cta-strip::after {
            content: '';
            display: block;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-light), transparent);
            margin-top: 20px;
        }

        .take-exam-btn {
            background: var(--btn-bg);
            color: white; border: none;
            padding: 13px 32px;
            border-radius: 40px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,139,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.02em;
        }
        .take-exam-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,139,0.4);
        }
        body.dark .take-exam-btn {
            box-shadow: 0 4px 20px rgba(255,165,0,0.35);
        }
        body.dark .take-exam-btn:hover {
            box-shadow: 0 8px 28px rgba(255,165,0,0.45);
        }

        .carousel-container {
            position: relative;
            width: calc(100% + 28px);
            margin-left: -14px;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        .carousel-slides {
            display: flex; transition: transform 0.5s ease-in-out;
            gap: 10px; padding: 0 16px;
            cursor: grab;
        }
        .carousel-slides:active { cursor: grabbing; }
        .carousel-slide {
            flex: 0 0 85%; border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
        }
        .carousel-slide img { width: 100%; height: auto; display: block; pointer-events: none; }
        .carousel-dots { text-align: center; padding: 12px 0; }
        .dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: rgba(0,0,0,0.15); margin: 0 3px;
            cursor: pointer; transition: all 0.3s;
        }
        body.dark .dot { background: rgba(255,255,255,0.18); }
        .dot.active { background: var(--gold); width: 20px; border-radius: 3px; }

        .plans-section {
            padding: 32px 0 48px;
            position: relative;
        }
        .plans-section-title {
            font-family: 'DM Serif Display', serif;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 6px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .plans-section-sub {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-weight: 400;
        }

        .plan-cards {
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 16px;
        }

        .plan-card {
            flex: 1; min-width: 230px; max-width: 290px;
            border-radius: 20px; padding: 28px 18px 24px;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.3s;
            position: relative; overflow: hidden;
            cursor: default;
            opacity: 0;
            animation: fadeSlideUp 0.6s cubic-bezier(0.34,1.2,0.64,1) forwards;
        }
        .plan-card:hover { transform: translateY(-8px); }
        .plan-free   { animation-delay: 0.1s; }
        .plan-zgju   { animation-delay: 0.2s; }
        .plan-qeleme { animation-delay: 0.3s; }

        .plan-card::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
        }

        .plan-free {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        .plan-free::before { background: linear-gradient(90deg, #aac4e8, #c8daff); }
        .plan-free:hover { box-shadow: 0 16px 40px rgba(0,0,139,0.1); }

        .plan-zgju {
            background: linear-gradient(160deg, #111630 0%, #090d22 100%);
            border: 1px solid rgba(255,165,0,0.2);
            box-shadow: 0 6px 28px rgba(0,0,40,0.45);
            color: #f0e8d0;
        }
        .plan-zgju::before { background: linear-gradient(90deg, #cc7700, #FFA500, #ffcc44, #FFA500, #cc7700); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
        .plan-zgju:hover { box-shadow: 0 18px 48px rgba(0,0,60,0.55); }

        .plan-qeleme {
            background: linear-gradient(160deg, #0c0a05 0%, #1a1200 100%);
            border: 1px solid rgba(255,215,0,0.4);
            box-shadow: 0 8px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,200,50,0.12);
            color: #f5e8c0;
        }
        .plan-qeleme::before { background: linear-gradient(90deg, #996600, #FFD700, #fff7aa, #FFD700, #996600); background-size: 200% 100%; animation: shimmer 2s linear infinite; height: 4px; }
        .plan-qeleme:hover { box-shadow: 0 22px 56px rgba(0,0,0,0.65), 0 0 36px rgba(255,200,0,0.18); }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .plan-badge-elite {
            display: inline-block;
            background: linear-gradient(135deg, #cc9900, #FFD700);
            color: #0c0a06;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 6px;
        }

        .plan-card h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem; font-weight: 400;
            margin: 8px 0 4px; letter-spacing: -0.01em;
        }
        .plan-price {
            font-size: 1.8rem; font-weight: 700;
            margin: 14px 0;
            font-variant-numeric: tabular-nums;
        }
        .plan-price small { font-size: 0.85rem; font-weight: 400; opacity: 0.6; }
        .plan-features {
            list-style: none; margin: 16px 0;
            padding: 0; text-align: left;
        }
        .plan-features li {
            margin: 9px 0; font-size: 0.88rem;
            display: flex; align-items: center; gap: 8px;
            font-weight: 400;
        }
        .plan-features li::before {
            content: '✓'; color: #4CAF50;
            font-weight: 700; font-size: 0.8rem;
            flex-shrink: 0;
        }

        .upgrade-btn {
            border: none; padding: 11px 18px;
            border-radius: 40px; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600; margin-top: 12px; width: 100%;
            font-size: 0.9rem; letter-spacing: 0.02em;
            transition: transform 0.2s, opacity 0.2s;
        }
        .upgrade-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .free-btn {
            background: transparent;
            border: 1.5px solid var(--navy);
            color: var(--navy);
        }
        body.dark .free-btn { border-color: rgba(180,200,255,0.35); color: #99aaff; }

        .zgju-btn {
            background: linear-gradient(135deg, #FFA500, #ff8c00);
            color: #0d1130;
            box-shadow: 0 3px 14px rgba(255,165,0,0.3);
        }
        .qeleme-btn {
            background: linear-gradient(135deg, #FFD700, #cc9900);
            color: #0c0a06;
            box-shadow: 0 3px 16px rgba(255,215,0,0.35);
        }

        .custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 20px; padding: 26px 22px;
            width: 90%; max-width: 340px; text-align: center;
            color: var(--text-primary);
            box-shadow: 0 20px 60px rgba(0,0,0,0.28);
            border: 1px solid var(--border-light);
        }
        .modal-content h4 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; font-weight: 400; margin-bottom: 10px; }
        .modal-content p { font-size: 0.9rem; color: var(--text-secondary); }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
        .modal-buttons button {
            padding: 9px 22px; border-radius: 30px; border: none;
            cursor: pointer; font-weight: 600;
            font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
        }
        .modal-confirm { background: var(--btn-bg); color: white; }
        .modal-cancel { background: var(--option-bg); color: var(--text-primary); }

        .sidebar a img { filter: brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important; }
        body.dark .sidebar a img { filter: brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important; }
        .menu-btn img { filter: brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important; }
        body.dark .menu-btn img { filter: brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 400px) {
            .nav-brand { font-size: 1.1rem; }
            .hero-text { font-size: 1.05rem; }
            .plans-section-title { font-size: 1.3rem; }
        }
        @media (min-width: 600px) {
            .nav-tagline { display: block; }
            .top-nav { padding: 10px 20px; }
        }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
    <button class="closebtn" onclick="closeNav()">✕</button>
    <div id="sidebarUserHeader" class="sidebar-user-header plan-free">
        <img id="sidebarAvatar" class="sidebar-avatar" src="default-avatar.png" alt="Profile" onerror="this.src='default-avatar.png'">
        <div class="sidebar-username" id="sidebarUsername">Student</div>
        <div class="sidebar-plan-badge badge-free" id="sidebarPlanBadge">Free</div>
    </div>
    <div class="sidebar-nav-links" id="sidebarLinks"></div>
    <a href="#" id="darkModeToggle" style="display:flex;align-items:center;">
        <img id="darkModeIcon" src="Moon.png" style="width:20px;height:20px;margin-right:12px;">
        <span id="darkModeText">Dark Mode</span>
    </a>
    <a href="#" class="logout" onclick="confirmLogout()" style="display:flex;align-items:center;">
        <img src="Logout.png" style="width:20px;height:20px;margin-right:12px;">
        Logout
    </a>
</div>

<div id="main" class="main">
    <nav class="top-nav">
        <div class="nav-left">
            <button class="menu-btn" onclick="openNav()">
                <img src="Menu.png" alt="Menu">
            </button>
        </div>
        <div class="nav-center">
            <img class="nav-logo-img" src="Bete_Fetena_Logo.png" alt="Logo">
            <div>
                <div class="nav-brand">Bete Fetena</div>
                <div class="nav-tagline">Examine Yourself, Show Who You Are.</div>
            </div>
        </div>
        <div class="nav-right">
            <button class="cta-nav-btn" onclick="navigateTo('exams.html')">Take Exam</button>
        </div>
    </nav>

    <div class="page-content">
        <div id="dynamicContent" class="content-area"></div>
    </div>
</div>

<script src="shared.js"></script>
<script>
    if (!checkAuth()) { /* not logged in - still show landing page, but we already handled? Actually checkAuth(false) would not redirect. Let's avoid redirect on home page when not logged in. We'll use a different check: show/hide based on login. For now, let's just load page without redirect. The checkAuth(true) will redirect if called. We'll call checkAuth(false) to just get status. We'll keep current behavior. But to avoid redirect on home page, we should not call checkAuth() with default true. So we'll modify: let's call isLoggedIn() instead. */

    const loggedIn = isLoggedIn();
    sessionStorage.setItem('currentPage', 'home.html');
    initDarkMode();
    buildSidebar('home', loggedIn);

    function populateSidebarHeader() {
        try {
            const data = getCurrentUserData ? getCurrentUserData() : null;
            if (!data) return;
            const user = data.account;
            const plan = user.plan || 'free';
            const name = user.name || 'Student';
            const father = user.father ? ' ' + user.father.charAt(0) + '.' : '';
            const displayName = name + father;
            const pic = user.profilePic || 'default-avatar.png';

            const header = document.getElementById('sidebarUserHeader');
            const avatar = document.getElementById('sidebarAvatar');
            const username = document.getElementById('sidebarUsername');
            const badge = document.getElementById('sidebarPlanBadge');

            if (avatar) { avatar.src = pic; avatar.onerror = () => { avatar.src = 'default-avatar.png'; }; }
            if (username) username.textContent = displayName;

            if (header) {
                header.className = 'sidebar-user-header plan-' + plan;
            }
            if (badge) {
                badge.className = 'sidebar-plan-badge badge-' + plan;
                const labels = { free: 'Free Plan', zgju: 'Zgju Plan', qeleme: '✦ Qeleme Elite' };
                badge.textContent = labels[plan] || 'Free Plan';
            }
        } catch(e) {}
    }
    if (loggedIn) populateSidebarHeader();

    function updateDarkModeToggleIcon() {
        const icon = document.getElementById('darkModeIcon');
        const text = document.getElementById('darkModeText');
        if (document.body.classList.contains('dark')) {
            icon.src = 'Sun.png'; text.textContent = 'Light Mode';
        } else {
            icon.src = 'Moon.png'; text.textContent = 'Dark Mode';
        }
    }

    const originalToggle = toggleDarkMode;
    toggleDarkMode = function() { originalToggle(); updateDarkModeToggleIcon(); };
    document.getElementById('darkModeToggle').addEventListener('click', e => { e.preventDefault(); toggleDarkMode(); });
    updateDarkModeToggleIcon();

    history.pushState({ home: true }, '', '#home');
    window.addEventListener('popstate', function() {
        showConfirmModal('Are you sure you want to log out?',
            function() { logout(); },
            function() { history.pushState({ home: true }, '', '#home'); }
        );
        history.pushState({ home: true }, '', '#home');
    });

    function showComingSoonModal() {
        const modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `<div class="modal-content"><h4>✨ Coming Soon</h4><p>Payment integration is under development. Stay tuned!</p><div class="modal-buttons"><button class="modal-confirm" id="comingSoonOk">OK</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#comingSoonOk').addEventListener('click', () => modal.remove());
    }

    let carouselInterval = null, currentSlideIndex = 0, slideCount = 4;
    let slidesContainer = null, autoScrollActive = true, totalSlides = 0;

    function initCarousel() {
        slidesContainer = document.querySelector('.carousel-slides');
        if (!slidesContainer) return;
        const firstSlide = slidesContainer.children[0].cloneNode(true);
        slidesContainer.appendChild(firstSlide);
        totalSlides = slideCount + 1;
        const dots = document.querySelectorAll('.dot');
        let startX = 0, startTranslate = 0, isDragging = false, dragStartIndex = 0;

        function getSlideUnit() {
            const slide = slidesContainer.children[0];
            const gap = parseFloat(getComputedStyle(slidesContainer).gap) || 10;
            return slide.offsetWidth + gap;
        }
        function goToSlide(index, withTransition = true) {
            if (withTransition) slidesContainer.style.transition = 'transform 0.5s ease-in-out';
            else slidesContainer.style.transition = 'none';
            slidesContainer.style.transform = `translateX(-${index * getSlideUnit()}px)`;
            const activeDotIndex = index % slideCount;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === activeDotIndex));
        }
        function nextSlide() {
            if (!autoScrollActive) return;
            currentSlideIndex++;
            goToSlide(currentSlideIndex, true);
            if (currentSlideIndex === totalSlides - 1) {
                setTimeout(() => {
                    slidesContainer.style.transition = 'none';
                    currentSlideIndex = 0;
                    goToSlide(0, false);
                    dots.forEach((d, i) => d.classList.toggle('active', i === 0));
                }, 500);
            }
        }
        function startAutoScroll() {
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(nextSlide, 3000);
        }
        function stopAutoScroll() { if (carouselInterval) clearInterval(carouselInterval); carouselInterval = null; }

        slidesContainer.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragStartIndex = currentSlideIndex; startTranslate = getSlideUnit() * currentSlideIndex; isDragging = true; stopAutoScroll(); slidesContainer.style.transition = 'none'; });
        slidesContainer.addEventListener('touchmove', e => { if (!isDragging) return; const deltaX = e.touches[0].clientX - startX; slidesContainer.style.transform = `translateX(-${startTranslate - deltaX}px)`; e.preventDefault(); });
        slidesContainer.addEventListener('touchend', e => { if (!isDragging) return; isDragging = false; const deltaX = e.changedTouches[0].clientX - startX; const unit = getSlideUnit(); let newIndex = dragStartIndex; if (Math.abs(deltaX) > unit / 4) { newIndex = deltaX > 0 ? Math.max(0, dragStartIndex-1) : Math.min(totalSlides-1, dragStartIndex+1); } currentSlideIndex = newIndex; goToSlide(currentSlideIndex, true); setTimeout(() => startAutoScroll(), 5000); });
        dots.forEach((dot, idx) => { dot.onclick = () => { autoScrollActive = false; stopAutoScroll(); currentSlideIndex = idx; goToSlide(idx, true); setTimeout(() => { autoScrollActive = true; startAutoScroll(); }, 5000); }; });

        startAutoScroll(); goToSlide(0, false);
        window.addEventListener('resize', () => { if (autoScrollActive) goToSlide(currentSlideIndex, false); });
    }

    function waveAnimation() {
        const container = document.getElementById("heroText");
        if (!container) return;
        const words = container.innerText.split(" ");
        container.innerHTML = "";
        words.forEach((word, idx) => {
            const span = document.createElement("span");
            span.innerText = word + " ";
            span.style.cssText = `display:inline-block;opacity:0;transform:translateY(-20px);transition:opacity 0.4s cubic-bezier(0.2,0.9,0.4,1.1) ${idx*0.07}s, transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1) ${idx*0.07}s;`;
            container.appendChild(span);
        });
        setTimeout(() => { container.querySelectorAll("span").forEach(s => { s.style.opacity = "1"; s.style.transform = "translateY(0)"; }); }, 50);
    }

    function renderHome() {
        const bannerImages = ['Bete_Fetena_Banner_1.png','Bete_Fetena_Banner_2.png','Bete_Fetena_Banner_3.png','Bete_Fetena_Banner_4.png'];
        let slidesHtml = '', dotsHtml = '';
        for (let i = 0; i < slideCount; i++) {
            slidesHtml += `<div class="carousel-slide"><img src="${bannerImages[i]}" alt="Banner ${i+1}" onerror="this.src='https://placehold.co/1663x640?text=Banner+${i+1}'"></div>`;
            dotsHtml += `<span class="dot"></span>`;
        }

        document.getElementById("dynamicContent").innerHTML = `
            <div class="hero-container">
                <img src="Bete_Fetena_Hero.png" alt="Hero" class="hero-image" onerror="this.src='https://placehold.co/800x400?text=Bete+Fetena'">
                <div class="hero-text" id="heroText">Welcome to Bete Fetena — where Ethiopian students unlock their academic potential!</div>
            </div>

            <div class="cta-strip">
                <button class="take-exam-btn" onclick="navigateTo('exams.html')">Take an Exam</button>
            </div>

            <div class="carousel-container">
                <div class="carousel-slides">${slidesHtml}</div>
                <div class="carousel-dots">${dotsHtml}</div>
            </div>

            <div class="plans-section">
                <div class="plans-section-title">Choose Your Path</div>
                <div class="plans-section-sub">Start free, upgrade when you're ready.</div>
                <div class="plan-cards">
                    <div class="plan-card plan-free">
                        <h3>Free</h3>
                        <div class="plan-price">ETB 0 <small>/ mo</small></div>
                        <ul class="plan-features"><li>150 questions</li></ul>
                        <button class="upgrade-btn free-btn" onclick="showComingSoonModal()">Start for free</button>
                    </div>
                    <div class="plan-card plan-zgju">
                        <h3>Zgju</h3>
                        <div class="plan-price" style="color:#FFA500;">ETB 199 <small>/ mo</small></div>
                        <ul class="plan-features"><li>1,000 Questions</li><li>Chart visualization</li></ul>
                        <button class="upgrade-btn zgju-btn" onclick="showComingSoonModal()">Upgrade</button>
                    </div>
                    <div class="plan-card plan-qeleme">
                        <div class="plan-badge-elite">✦ Elite</div>
                        <h3>Qeleme</h3>
                        <div class="plan-price" style="color:#FFD700;">ETB 399 <small>/ mo</small></div>
                        <ul class="plan-features"><li>2,500 questions</li><li>Chart visualization</li><li>Book recommendations</li></ul>
                        <button class="upgrade-btn qeleme-btn" onclick="showComingSoonModal()">Upgrade to Elite</button>
                    </div>
                </div>
            </div>
        `;
        currentSlideIndex = 0; autoScrollActive = true;
        initCarousel(); waveAnimation();
    }

    renderHome();
    </script>
</body>
</html>
