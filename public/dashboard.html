<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bete Fetena - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --bg-body: #f0ece4;
            --bg-sidebar: #fdf9f4;
            --sidebar-text: #1a1200;
            --text-primary: #1a1200;
            --card-bg: #ffffff;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.12);
            --btn-bg: #00008B;
            --btn-hover: #FFA500;
            --cat-bg: #f5f0e8;
            --option-bg: #ede8df;
            --border-light: rgba(0,0,0,0.1);
            --gold: #FFA500;
            --navy: #00008B;
            --ink: #1a1200;
            --cream: #fdf9f4;
            --table-head: #00008B;
            --table-alt: #f7f3ec;
            --grain-opacity: 0.04;
        }
        body.dark {
            --bg-body: #0d0b07;
            --bg-sidebar: #13110c;
            --sidebar-text: #FFA500;
            --text-primary: #f0e8d0;
            --card-bg: #1a1610;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
            --btn-bg: #FFA500;
            --btn-hover: #00008B;
            --cat-bg: #1e1a12;
            --option-bg: #211d14;
            --border-light: rgba(255,255,255,0.08);
            --gold: #FFA500;
            --navy: #6688ff;
            --ink: #f0e8d0;
            --cream: #13110c;
            --table-head: #FFA500;
            --table-alt: #1e1a12;
            --grain-opacity: 0.06;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9999;
        }

        .sidebar {
            height:100%;width:0;position:fixed;top:0;left:0;
            background:var(--bg-sidebar);overflow-x:hidden;
            transition:0.35s cubic-bezier(0.4,0,0.2,1);
            padding-top:80px;z-index:1000;
            box-shadow:4px 0 40px rgba(0,0,0,0.15);
            border-right:1px solid var(--border-light);
        }
        .sidebar a {
            padding:14px 28px;text-decoration:none;
            font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;
            letter-spacing:0.03em;color:var(--sidebar-text);
            display:flex;align-items:center;
            transition:background 0.2s, padding-left 0.2s;
        }
        .sidebar a:hover{background:rgba(255,165,0,0.08);padding-left:36px;}
        .sidebar .closebtn{position:absolute;top:16px;right:24px;font-size:28px;color:var(--sidebar-text);padding:0 !important;}
        .sidebar .closebtn:hover{background:transparent !important;padding-left:0 !important;}
        .sidebar .logout{color:#e05555;margin-top:30px;border-top:1px solid var(--border-light);}
        body.dark .sidebar .logout{border-top-color:rgba(255,255,255,0.08);}

        .main{padding:0 16px}
        .top-bar {
            display:flex;align-items:center;justify-content:space-between;
            gap:4px;padding:14px 0;
            border-bottom:1px solid var(--border-light);
            min-height:74px;position:relative;
        }
        .top-bar::after {
            content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
            background:linear-gradient(90deg,transparent,var(--gold),transparent);
            opacity:0.5;
        }
        .openbtn {
            font-size:30px;cursor:pointer;background:transparent;border:none;
            padding:6px;border-radius:8px;
            display:flex;align-items:center;justify-content:center;
            transition:background 0.2s;
        }
        .openbtn:hover{background:rgba(255,165,0,0.1);}
        .openbtn img{width:28px;height:28px;}
        .logo-area{text-align:center;flex-grow:1}
        .logo-area h1{
            font-family:'Cinzel',serif;font-size:1.7rem;font-weight:700;
            margin:0;line-height:1.2;letter-spacing:0.05em;
        }
        .logo-area h1 .bete{color:var(--navy)}
        .logo-area h1 .fetena{color:var(--gold)}
        .logo-area p{color:var(--text-primary);opacity:0.6;font-size:0.72rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;}
        img#logoImg{height:40px;margin-right:4px;vertical-align:middle}

        .content-area{background:transparent;padding:0;margin-top:0;min-height:300px}

        .dashboard-header {
            display:flex;align-items:center;justify-content:space-between;
            margin:24px 0 20px;
        }
        .dashboard-header h3 {
            font-family:'Cinzel',serif;
            margin:0;font-size:1.4rem;font-weight:700;
            flex:1;text-align:center;letter-spacing:0.08em;
        }
        .back-chevron {
            font-size:1.8rem;cursor:pointer;color:var(--text-primary);
            width:36px;line-height:1;
            opacity:0.6;transition:opacity 0.2s;
        }
        .back-chevron:hover{opacity:1;}
        .dashboard-controls{display:flex;gap:10px;align-items:center;}

        .section-label {
            font-family:'Cinzel',serif;
            font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;
            opacity:0.35;font-weight:400;
            text-align:right;margin-bottom:10px;
        }

        .chart-card {
            background:var(--card-bg);
            border-radius:20px;
            padding:20px 16px 16px;
            margin-bottom:20px;
            box-shadow:var(--shadow);
            border:1px solid var(--border-light);
            position:relative;overflow:hidden;
        }
        .chart-card::before {
            content:'';position:absolute;top:0;left:0;right:0;height:3px;
            background:linear-gradient(90deg,var(--navy),var(--gold));
        }

        .table-card {
            background:var(--card-bg);
            border-radius:20px;
            padding:20px 12px;
            margin-bottom:20px;
            box-shadow:var(--shadow);
            border:1px solid var(--border-light);
            overflow-x:auto;
            position:relative;
        }
        .table-card::before {
            content:'';position:absolute;top:0;left:0;right:0;height:3px;
            background:linear-gradient(90deg,var(--gold),var(--navy));
        }
        .summary-table{
            width:100%;border-collapse:collapse;
            margin:0;font-size:0.78rem;
            font-family:'Outfit',sans-serif;
        }
        .summary-table th {
            background:var(--table-head);
            color:white;padding:10px 8px;
            text-align:center;font-weight:600;
            letter-spacing:0.04em;
            white-space:nowrap;
        }
        body.dark .summary-table th{color:#0d0b07;}
        .summary-table td{
            border-bottom:1px solid var(--border-light);
            padding:9px 8px;text-align:center;
            transition:background 0.15s;
        }
        .summary-table tbody tr:hover{background:rgba(255,165,0,0.05);}
        .summary-table tbody tr:nth-child(even){background:var(--table-alt);}
        .summary-table tbody tr:nth-child(even):hover{background:rgba(255,165,0,0.08);}
        .summary-table tr:last-child{
            font-weight:700;
            background:var(--cat-bg) !important;
            border-top:2px solid var(--border-light);
        }

        .custom-dropdown{position:relative;display:inline-block;font-size:0.78rem;}
        .dropdown-btn {
            background:var(--cat-bg);color:var(--text-primary);
            padding:6px 12px;border-radius:30px;cursor:pointer;
            display:flex;align-items:center;gap:6px;
            border:1px solid var(--border-light);
            font-family:'Outfit',sans-serif;font-weight:500;
            transition:border-color 0.2s, background 0.2s;
        }
        .dropdown-btn:hover{border-color:var(--gold);background:rgba(255,165,0,0.06);}
        .dropdown-arrow{font-size:0.85rem;transition:transform 0.2s;display:inline-block}
        .dropdown-arrow.open{transform:rotate(90deg)}
        .dropdown-list {
            position:absolute;top:calc(100% + 4px);right:0;
            background:var(--card-bg);
            border:1px solid var(--border-light);
            border-radius:14px;list-style:none;
            margin:0;padding:6px;
            z-index:100;
            box-shadow:0 8px 30px rgba(0,0,0,0.15);
            min-width:200px;display:none;
            overflow:hidden;
        }
        .dropdown-list li {
            padding:8px 14px;cursor:pointer;
            font-size:0.78rem;white-space:nowrap;
            border-radius:8px;
            transition:background 0.15s, color 0.15s;
        }
        .dropdown-list li:hover{background:var(--gold);color:#0d0b07;font-weight:600;}
        .dropdown-list.show{display:block}

        .print-btn {
            background:var(--btn-bg);color:white;border:none;
            padding:10px 22px;border-radius:30px;
            cursor:pointer;font-size:0.9rem;font-weight:700;
            font-family:'Outfit',sans-serif;letter-spacing:0.06em;
            transition:transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-shadow:0 4px 16px rgba(0,0,139,0.25);
        }
        .print-btn:hover{transform:translateY(-2px);opacity:0.92;box-shadow:0 8px 24px rgba(0,0,139,0.35);}
        body.dark .print-btn{box-shadow:0 4px 16px rgba(255,165,0,0.25);}

        .back-btn {
            background:transparent;color:var(--text-primary);
            border:1px solid var(--border-light);
            padding:10px 22px;border-radius:30px;
            cursor:pointer;font-size:0.9rem;font-weight:600;
            font-family:'Outfit',sans-serif;letter-spacing:0.06em;
            transition:border-color 0.2s, background 0.2s;
        }
        .back-btn:hover{border-color:var(--gold);background:rgba(255,165,0,0.06);}

        .empty-btn, .brand-btn {
            background:var(--btn-bg);color:white;border:none;
            padding:12px 30px;border-radius:40px;
            font-size:1rem;font-weight:700;cursor:pointer;
            font-family:'Outfit',sans-serif;letter-spacing:0.06em;
            transition:transform 0.2s, opacity 0.2s;
            box-shadow:0 4px 16px rgba(0,0,139,0.25);
        }
        .empty-btn:hover, .brand-btn:hover{transform:translateY(-2px);opacity:0.9;}

        #lineChartContainer{display:none;overflow:hidden;transition:max-height 0.5s ease-out;max-height:0}
        #lineChartContainer.show{display:block;max-height:800px}

        .empty-state{margin:20px 0}
        .empty-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .empty-header h3{
            font-family:'Cinzel',serif;
            margin:0;font-size:1.4rem;font-weight:700;letter-spacing:0.08em;
        }
        .empty-content{
            text-align:center;padding:50px 20px;
            background:var(--card-bg);
            border-radius:20px;
            box-shadow:var(--shadow);
            border:1px solid var(--border-light);
        }
        .empty-content p{font-size:1.1rem;margin-bottom:24px;opacity:0.7;}

        .custom-modal{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(6px);
            display:flex;align-items:center;justify-content:center;z-index:10000
        }
        .modal-content{
            background:var(--card-bg);border-radius:20px;
            padding:28px 24px;width:90%;max-width:360px;
            text-align:center;color:var(--text-primary);
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
            border:1px solid var(--border-light);
        }
        .modal-buttons{display:flex;gap:10px;justify-content:center;margin-top:16px;}
        .modal-buttons button{
            padding:10px 24px;border-radius:30px;border:none;
            cursor:pointer;font-weight:700;font-family:'Outfit',sans-serif;
        }
        .modal-confirm{background:var(--btn-bg);color:white;}
        .modal-cancel{background:var(--option-bg);color:var(--text-primary);}

        .chart-key {
            display:flex;flex-wrap:wrap;gap:14px;
            margin:12px 0 4px;
            justify-content:center;align-items:center;
        }
        .key-item{
            display:inline-flex;align-items:center;gap:6px;
            font-size:11px;color:var(--text-primary);opacity:0.75;
            font-family:'Outfit',sans-serif;
        }
        .key-green-line{display:inline-block;width:24px;height:2px;background:transparent;border-bottom:2px dashed green;position:relative;}
        .key-green-line::after{content:none}
        .key-bar{display:inline-block;width:20px;height:12px;background:var(--btn-bg);border:1px solid var(--border-light);border-radius:3px;}
        .key-dot-circle{display:inline-block;width:12px;height:12px;background:var(--btn-bg);border-radius:50%;border:1px solid var(--border-light);}
        .key-triangle{display:inline-block;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid #ff4444;}
        .key-clock-icon{display:inline-block;width:14px;height:14px;background:#ff4444;border-radius:50%;position:relative;}
        .key-clock-icon::after{content:'';position:absolute;top:2px;left:6px;width:2px;height:5px;background:white;}
        .key-clock-icon::before{content:'';position:absolute;top:6px;left:2px;width:7px;height:2px;background:white;}
        .key-half-red{display:inline-block;width:14px;height:14px;background:linear-gradient(to right,#ff4444 50%,var(--btn-bg) 50%);border-radius:50%;border:1px solid var(--border-light);}
        .key-half-red-right{display:inline-block;width:14px;height:14px;background:linear-gradient(to right,var(--btn-bg) 50%,#ff4444 50%);border-radius:50%;border:1px solid var(--border-light);}
        .key-full-red{display:inline-block;width:14px;height:14px;background:#ff4444;border-radius:50%;border:1px solid var(--border-light);}

        .sidebar a img{filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;}
        body.dark .sidebar a img{filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;}
        .openbtn img{filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;}
        body.dark .openbtn img{filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;}

        .red-text{color:#ff4444 !important;}
        .subject-header{display:flex;align-items:center;justify-content:center;gap:5px;}
        .clock-icon{width:16px;height:16px;margin-left:5px;}
        .late-clock{filter:brightness(0) saturate(100%) invert(15%) sepia(95%) saturate(6932%) hue-rotate(358deg) brightness(95%) contrast(112%) !important;}
        .warning-icon{width:16px;height:16px;margin-left:5px;filter:brightness(0) saturate(100%) invert(55%) sepia(96%) saturate(2000%) hue-rotate(350deg);}

        @media print {
            body * { visibility: hidden; }
            #printable-report, #printable-report * { visibility: visible; }
            #printable-report { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; background: white; color: black; }
            .summary-table th { background-color: #00008B !important; color: white !important; }
            .summary-table td, .summary-table th { border: 1px solid #000 !important; }
            canvas { max-width: 100%; height: auto; }
            .print-chart-container { page-break-inside: avoid; break-inside: avoid; position: relative; margin-top: 20px; }
            * { print-color-adjust: exact !important; -webkit-print-color-adjust: exact !important; }
        }

        @media (max-width:768px){
            .openbtn{font-size:24px;padding:6px 10px}
            .top-bar{min-height:60px;padding:8px 0}
            img#logoImg{height:32px}
            .logo-area h1{font-size:1.3rem}
            .logo-area p{font-size:0.65rem}
            .dashboard-header{flex-wrap:wrap}
            .dashboard-controls{margin-left:auto}
            .summary-table{font-size:0.62rem}
            .summary-table th,.summary-table td{padding:6px 4px}
            .chart-key{gap:8px}
            .key-item{font-size:10px}
        }

        @keyframes fadeSlideUp {
            from{opacity:0;transform:translateY(20px);}
            to{opacity:1;transform:translateY(0);}
        }
        .chart-card, .table-card {
            opacity:0;
            animation:fadeSlideUp 0.5s cubic-bezier(0.34,1.2,0.64,1) forwards;
        }
        .chart-card:nth-child(1){animation-delay:0.1s}
        .chart-card:nth-child(2){animation-delay:0.2s}
        .table-card{animation-delay:0.3s}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div id="sidebarLinks"></div>
    <a href="#" id="darkModeToggle" style="display:flex;align-items:center;">
        <img id="darkModeIcon" src="Moon.png" style="width:24px;height:24px;margin-right:12px;">
        <span id="darkModeText">Dark Mode</span>
    </a>
    <a href="#" class="logout" onclick="confirmLogout()" style="display:flex;align-items:center;">
        <img src="Logout.png" style="width:24px;height:24px;margin-right:12px;">
        Logout
    </a>
</div>

<div id="main" class="main">
    <div class="top-bar">
        <button class="openbtn" onclick="openNav()">
            <img src="Menu.png" alt="Menu">
        </button>
        <img id="logoImg" src="Bete_Fetena_Logo.png" alt="Logo" style="height:40px;margin-right:2px;vertical-align:middle;">
        <div class="logo-area">
            <h1><span class="bete">Bete</span><span class="fetena"> Fetena</span></h1>
            <p>Examine Yourself, Show Who You Are.</p>
        </div>
    </div>
    <div id="dynamicContent" class="content-area"></div>
</div>

<script src="shared.js"></script>
<script>
    if (!checkAuth()) { /* redirected */ }
    sessionStorage.setItem('currentPage', 'dashboard.html');
    initDarkMode();
    buildSidebar('dashboard');

    function updateDarkModeToggleIcon() {
        const icon = document.getElementById('darkModeIcon');
        const text = document.getElementById('darkModeText');
        if (document.body.classList.contains('dark')) {
            icon.src = 'Sun.png';
            text.textContent = 'Light Mode';
        } else {
            icon.src = 'Moon.png';
            text.textContent = 'Dark Mode';
        }
    }

    const originalToggle = toggleDarkMode;
    toggleDarkMode = function() {
        originalToggle();
        updateDarkModeToggleIcon();
        updateChartsForTheme();
    };

    document.getElementById('darkModeToggle').addEventListener('click', function(e) { e.preventDefault(); toggleDarkMode(); });
    updateDarkModeToggleIcon();

    let barChart = null, lineChart = null, currentSubjects = [], currentAvgScores = [], currentFiltered = null, currentSelectedBarIndex = -1;
    let subjectOvertimeMap = {};
    let subjectLowScoreMap = {};
    let subjectTotalQuestionsMap = {};

    const barIconPlugin = {
        id: 'barIconPlugin',
        afterDraw(chart) {
            if (!subjectOvertimeMap && !subjectLowScoreMap) return;
            const ctx = chart.ctx;
            const meta = chart.getDatasetMeta(0);
            const bars = meta.data;
            for (let i = 0; i < bars.length; i++) {
                const subject = chart.data.labels[i];
                const bar = bars[i];
                if (!bar) continue;
                const hasClock = subjectOvertimeMap[subject];
                const hasWarning = subjectLowScoreMap[subject];
                if (!hasClock && !hasWarning) continue;
                const x = bar.x;
                const topY = bar.y;
                const width = bar.width;
                const height = bar.height;
                if (width < 5 || height < 5) continue;
                let iconSize = Math.min(14, width * 0.35, height * 0.35);
                iconSize = Math.max(6, iconSize);
                const padding = 2;
                const leftX = x - width/2 + padding;
                const rightX = x + width/2 - iconSize - padding;
                const topInside = topY + padding;
                if (hasWarning) {
                    ctx.fillStyle = '#ff4444';
                    ctx.beginPath();
                    ctx.moveTo(leftX, topInside + iconSize);
                    ctx.lineTo(leftX + iconSize/2, topInside);
                    ctx.lineTo(leftX + iconSize, topInside + iconSize);
                    ctx.fill();
                }
                if (hasClock) {
                    ctx.fillStyle = '#ff4444';
                    ctx.beginPath();
                    ctx.arc(rightX + iconSize/2, topInside + iconSize/2, iconSize/2, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(rightX + iconSize/2, topInside + iconSize/2, iconSize/4, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        }
    };

    const greenLinePlugin = {
        id: 'greenLinePlugin',
        afterDraw(chart) {
            const ctx = chart.ctx;
            const yScale = chart.scales.y;
            const xScale = chart.scales.x;
            const dataset = chart.data.datasets[0];
            if (!dataset || !dataset.data) return;
            const subjects = chart.data.labels;
            for (let i = 0; i < subjects.length; i++) {
                const subject = subjects[i];
                const totalQ = subjectTotalQuestionsMap[subject];
                if (!totalQ) continue;
                const y = yScale.getPixelForValue(totalQ);
                const xLeft = xScale.getPixelForValue(i) - (xScale.getPixelForValue(1) - xScale.getPixelForValue(0)) / 2;
                const xRight = xScale.getPixelForValue(i) + (xScale.getPixelForValue(1) - xScale.getPixelForValue(0)) / 2;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(xLeft, y);
                ctx.lineTo(xRight, y);
                ctx.strokeStyle = 'green';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.font = 'bold 9px Outfit, Arial';
                ctx.fillStyle = 'green';
                ctx.shadowBlur = 0;
                ctx.fillText(`${totalQ}`, xLeft + 2, y - 2);
                ctx.restore();
            }
        }
    };

    function formatTime(seconds) {
        if (!seconds && seconds !== 0) return '-';
        const days = Math.floor(seconds / 86400);
        const hrs = Math.floor((seconds % 86400) / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        if (days > 0) return `${days}d ${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        else if (hrs > 0) return `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        else return `${mins}:${secs.toString().padStart(2,'0')}`;
    }

    function getBarColors(isDarkMode, selectedIndex = -1) {
        const defaultColor = isDarkMode ? '#FFA500' : '#00008B';
        const highlightColor = isDarkMode ? '#00008B' : '#FFA500';
        return (index) => (index === selectedIndex ? highlightColor : defaultColor);
    }
    function getLineColor(isDarkMode) { return isDarkMode ? '#FFA500' : '#00008B'; }

    function createBarChart(subjects, avgScores, maxQuestions, selectedIndex = -1) {

            },

    function createLineChart(labels, scores, maxScore, lateFlags, lowScoreFlags, subject) {
        const isDark = document.body.classList.contains('dark');
        const lineCtx = document.getElementById('trendChart').getContext('2d');
        if (lineChart) lineChart.destroy();
        lineChart = new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: `Score (Correct Answers) - ${subject}`,
                    data: scores,
                    borderColor: getLineColor(isDark),
                    tension: 0.3,
                    fill: false,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    pointBackgroundColor: 'transparent',
                    pointBorderColor: 'transparent',
                }],
                lowScoreFlags: lowScoreFlags,
                lateFlags: lateFlags
            },
            options: {
                responsive: true, maintainAspectRatio: true,
                scales: {
                    y: { beginAtZero: true, max: maxScore, ticks: { stepSize: Math.ceil(maxScore / 5), font: { family: 'Outfit' } } },
                    x: { ticks: { font: { family: 'Outfit' } } }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (context) => {
                                let label = `Score: ${context.raw}`;
                                const idx = context.dataIndex;
                                if (lateFlags[idx]) label += ' (Late)';
                                if (lowScoreFlags[idx]) label += ' (Low score)';
                                return label;
                            }
                        }
                    }
                },
                onClick: (event, activeElements) => {
                    if (activeElements && activeElements.length > 0) return;
                    const chart = lineChart;
                    const canvasPosition = Chart.helpers.getRelativePosition(event, chart);
                    const xValue = chart.scales.x.getValueForPixel(canvasPosition.x);
                    if (xValue === undefined) return;
                    let closestIndex = 0;
                    let minDiff = Math.abs(xValue - 0);
                    for (let i = 0; i < chart.data.labels.length; i++) {
                        const diff = Math.abs(xValue - i);
                        if (diff < minDiff) { minDiff = diff; closestIndex = i; }
                    }
                    if (minDiff <= 0.6) {
                        const meta = chart.getDatasetMeta(0);
                        const point = meta.data[closestIndex];
                        if (point && point.getProps) {
                            chart.tooltip.setActiveElements([{ datasetIndex: 0, index: closestIndex }], { x: point.x, y: point.y });
                            chart.update();
                        }
                    }
                }
            },
            plugins: [{
                id: 'customHalfDots',
                afterDatasetDraw(chart) {
                    const { ctx } = chart;
                    const meta = chart.getDatasetMeta(0);
                    const points = meta.data;
                    const lowFlags = chart.data.lowScoreFlags;
                    const lateFlags = chart.data.lateFlags;
                    if (!points || !points.length) return;
                    const isDark = document.body.classList.contains('dark');
                    const defaultColor = getLineColor(isDark);
                    for (let i = 0; i < points.length; i++) {
                        const point = points[i];
                        const x = point.x; const y = point.y;
                        const isLow = lowFlags[i]; const isLate = lateFlags[i];
                        const radius = 6;
                        if (!isLow && !isLate) {
                            ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
                            ctx.fillStyle = defaultColor; ctx.fill();
                            ctx.strokeStyle = '#333'; ctx.stroke();
                            continue;
                        }
                        if (isLow && isLate) {
                            ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
                            ctx.fillStyle = '#ff4444'; ctx.fill();
                            ctx.strokeStyle = '#333'; ctx.stroke();
                        } else {
                            if (isLow) {
                                ctx.beginPath(); ctx.arc(x, y, radius, Math.PI/2, 3*Math.PI/2); ctx.fillStyle = '#ff4444'; ctx.fill();
                                ctx.beginPath(); ctx.arc(x, y, radius, 3*Math.PI/2, Math.PI/2); ctx.fillStyle = defaultColor; ctx.fill();
                            } else if (isLate) {
                                ctx.beginPath(); ctx.arc(x, y, radius, 3*Math.PI/2, Math.PI/2); ctx.fillStyle = '#ff4444'; ctx.fill();
                                ctx.beginPath(); ctx.arc(x, y, radius, Math.PI/2, 3*Math.PI/2); ctx.fillStyle = defaultColor; ctx.fill();
                            }
                            ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
                            ctx.strokeStyle = '#333'; ctx.stroke();
                        }
                    }
                }
            }]
        });
        updateLineChartKey(lowScoreFlags, lateFlags);
    }

    function updateLineChartKey(lowScoreFlags, lateFlags) {
        const isDark = document.body.classList.contains('dark');
        const baseColor = isDark ? '#FFA500' : '#00008B';
        const hasLow = lowScoreFlags.some(f => f === true);
        const hasLate = lateFlags.some(f => f === true);
        const hasBoth = lowScoreFlags.some((f, i) => f && lateFlags[i]);
        let keyHtml = '<div class="chart-key">';
        if (hasLow) keyHtml += `<div class="key-item"><div class="key-half-red" style="background:linear-gradient(to right,#ff4444 50%,${baseColor} 50%);"></div><span>Low score (&lt;50%)</span></div>`;
        if (hasLate) keyHtml += `<div class="key-item"><div class="key-half-red-right" style="background:linear-gradient(to right,${baseColor} 50%,#ff4444 50%);"></div><span>Late exam</span></div>`;
        if (hasBoth) keyHtml += '<div class="key-item"><div class="key-full-red"></div><span>Both low & late</span></div>';
        if (!hasLow && !hasLate) keyHtml += `<div class="key-item"><div class="key-dot-circle" style="background:${baseColor};"></div><span>Normal score</span></div>`;
        keyHtml += '</div>';
        const container = document.getElementById('lineChartContainer');
        if (!container) return;
        let oldKey = document.getElementById('lineChartKey');
        if (oldKey) oldKey.remove();
        const keyDiv = document.createElement('div');
        keyDiv.id = 'lineChartKey';
        keyDiv.innerHTML = keyHtml;
        container.appendChild(keyDiv);
    }

    function getIndividualScoresForSubject(filtered, subject) {
        const exams = filtered.filter(h => h.subject === subject);
        exams.sort((a, b) => new Date(a.date) - new Date(b.date));
        const labels = exams.map((_, i) => `Exam ${i+1}`);
        const scores = exams.map(e => e.correct);
        const maxScore = Math.max(...scores, ...exams.map(e => e.total));
        const lateFlags = exams.map(e => (e.timeTaken && e.expectedTime && e.timeTaken > e.expectedTime) ? true : false);
        const lowScoreFlags = exams.map(e => (e.correct < e.total / 2) ? true : false);
        return { labels, scores, maxScore, lateFlags, lowScoreFlags };
    }

    function getSubjectSummary(filtered) {
        const subjectMap = {};
        filtered.forEach(h => {
            if (!subjectMap[h.subject]) subjectMap[h.subject] = { totalQuestions:0, totalScore:0, totalTime:0, totalExpectedTime:0, examCount:0, examScores:[] };
            subjectMap[h.subject].totalQuestions += h.total;
            subjectMap[h.subject].totalScore += h.correct;
            subjectMap[h.subject].examScores.push(h.correct);
            if (h.timeTaken && h.expectedTime) {
                subjectMap[h.subject].totalTime += h.timeTaken;
                subjectMap[h.subject].totalExpectedTime += h.expectedTime;
                subjectMap[h.subject].examCount++;
            } else if (!h.timeTaken) {
                subjectMap[h.subject].examCount++;
            }
        });
        let rows = [], grandTotalQuestions=0, grandTotalScore=0, grandTotalTime=0, grandTotalExpectedTime=0, grandTotalExamCount=0;
        let index = 1;
        for (const [subject, data] of Object.entries(subjectMap)) {
            const percentage = (data.totalScore / data.totalQuestions) * 100;
            const avgScore = data.examScores.length > 0 ? data.examScores.reduce((a,b)=>a+b,0) / data.examScores.length : 0;
            const avgTime = data.examCount > 0 && data.totalTime > 0 ? data.totalTime / data.examCount : null;
            const avgExpected = data.examCount > 0 && data.totalExpectedTime > 0 ? data.totalExpectedTime / data.examCount : null;
            const isLateTime = (avgTime && avgExpected && avgTime > avgExpected) ? true : false;
            const isLowScore = (data.totalScore < data.totalQuestions / 2);
            rows.push({ no:index++, subject, totalQuestions:data.totalQuestions, totalScore:data.totalScore, percentage, examCount:data.examCount, avgScore, avgTime, totalTime:data.totalTime, isLateTime, isLowScore, totalExpectedTime:data.totalExpectedTime, avgExpected });
            grandTotalQuestions += data.totalQuestions;
            grandTotalScore += data.totalScore;
            grandTotalTime += data.totalTime;
            grandTotalExpectedTime += data.totalExpectedTime;
            grandTotalExamCount += data.examCount;
        }
        const overallPercentage = (grandTotalScore / grandTotalQuestions) * 100;
        const overallIsLowScore = (grandTotalScore < grandTotalQuestions / 2);
        const overallIsLateTime = (grandTotalTime > grandTotalExpectedTime);
        return { rows, grandTotalQuestions, grandTotalScore, overallPercentage, grandTotalTime, grandTotalExpectedTime, grandTotalExamCount, overallIsLowScore, overallIsLateTime };
    }

    function getSubjectAverageScores(filtered) {
        const subjectMap = {};
        filtered.forEach(h => {
            if (!subjectMap[h.subject]) subjectMap[h.subject] = { total:0, sum:0, maxTotal:h.total };
            subjectMap[h.subject].sum += h.correct;
            subjectMap[h.subject].total++;
            subjectMap[h.subject].maxTotal = Math.max(subjectMap[h.subject].maxTotal, h.total);
        });
        const subjects = Object.keys(subjectMap);
        const avgScores = subjects.map(s => subjectMap[s].sum / subjectMap[s].total);
        const maxTotalPerSubject = subjects.map(s => subjectMap[s].maxTotal);
        const globalMaxQuestions = Math.max(...maxTotalPerSubject, 100);
        subjects.forEach(s => { subjectTotalQuestionsMap[s] = subjectMap[s].maxTotal; });
        return { subjects, avgScores, maxQuestions: globalMaxQuestions };
    }

    function getDateRangeString(range) {
        const now = new Date();
        let cutoff = new Date();
        if (range === 'lastday') cutoff.setDate(now.getDate() - 1);
        else if (range === 'last7days') cutoff.setDate(now.getDate() - 7);
        else if (range === 'last30days') cutoff.setDate(now.getDate() - 30);
        else cutoff.setDate(now.getDate() - 7);
        const format = d => `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
        return `${format(cutoff)} - ${format(now)}`;
    }

    function filterHistory(range, category, historyRaw) {
        const now = new Date();
        let cutoff = new Date();
        if (range === 'lastday') cutoff.setDate(now.getDate() - 1);
        else if (range === 'last7days') cutoff.setDate(now.getDate() - 7);
        else if (range === 'last30days') cutoff.setDate(now.getDate() - 30);
        else cutoff.setDate(now.getDate() - 7);
        let filtered = historyRaw.filter(h => new Date(h.date) >= cutoff);
        return category === 'national' ? filtered : [];
    }

    function getCurrentAccountFullName() {
        try {
            const phone = getUserPhone();
            if (!phone) return "Student";
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const phoneData = users[phone];
            if (!phoneData || !phoneData.accounts) return "Student";
            const currentAccountId = getCurrentAccountId();
            const account = phoneData.accounts.find(acc => acc.accountId === currentAccountId);
            if (!account) return "Student";
            const name = account.name || '';
            const father = account.father || '';
            if (name && father) return `${name} ${father}`;
            if (name) return name;
            return "Student";
        } catch (e) { return "Student"; }
    }

            stampImg.style.cssText = "position:absolute;width:88.8px;height:50px;opacity:1;transform:rotate(-15deg);pointer-events:none;";
            const barContainer = printDiv.querySelector('#barChartContainer');
            if (barContainer) { const s = stampImg.cloneNode(true); s.style.top="10px"; s.style.right="10px"; barContainer.style.position="relative"; barContainer.appendChild(s); }
            if (lineImg) { const lineContainer = printDiv.querySelector('.print-chart-container'); if (lineContainer) { const s = stampImg.cloneNode(true); s.style.top="10px"; s.style.right="10px"; lineContainer.style.position="relative"; lineContainer.appendChild(s); } }
            const tableContainer = printDiv.querySelector('#tableContainer');
            if (tableContainer) { const s = stampImg.cloneNode(true); s.style.top="auto"; s.style.bottom="5px"; s.style.right="5px"; tableContainer.style.position="relative"; tableContainer.appendChild(s); }
            window.print();
            tempBarChart.destroy();
            if (lineCanvas) lineCanvas.remove();
            barCanvas.remove();
        }, 200);
    }

    function buildPrintTableHtml(summary) {
        let tableHtml = `<h4 style="text-align:center;margin:20px 0 5px 0;">Subject Performance Summary</h4>
            <table style="width:100%;border-collapse:collapse;margin-top:0;border:1px solid #000;">
            <thead><tr style="background:transparent;color:#00008B;font-weight:bold;">
                <th style="border:1px solid #000;padding:8px;">No.</th>
                <th style="border:1px solid #000;padding:8px;">Subject</th>
                <th style="border:1px solid #000;padding:8px;">No. of Exams</th>
                <th style="border:1px solid #000;padding:8px;">Total Questions</th>
                <th style="border:1px solid #000;padding:8px;">Total Score</th>
                <th style="border:1px solid #000;padding:8px;">Avg Score</th>
                <th style="border:1px solid #000;padding:8px;">Percentage (%)</th>
                <th style="border:1px solid #000;padding:8px;">Total Time</th>
                <th style="border:1px solid #000;padding:8px;">Avg Time</th>
            </td></thead><tbody>`;
        summary.rows.forEach(row => {
            const totalTimeColor = row.isLateTime ? 'color:red;' : '';
            const scoreColor = row.isLowScore ? 'color:red;' : '';
            tableHtml += `<tr>
                <td style="border:1px solid #000;padding:8px;">${row.no}</td>
                <td style="border:1px solid #000;padding:8px;">${row.subject}</td>
                <td style="border:1px solid #000;padding:8px;">${row.examCount}</td>
                <td style="border:1px solid #000;padding:8px;">${row.totalQuestions}</td>
                <td style="border:1px solid #000;padding:8px;${scoreColor}">${row.totalScore}</td>
                <td style="border:1px solid #000;padding:8px;${scoreColor}">${row.avgScore.toFixed(1)}</td>
                <td style="border:1px solid #000;padding:8px;${scoreColor}">${row.percentage.toFixed(1)}</td>
                <td style="border:1px solid #000;padding:8px;${totalTimeColor}">${formatTime(row.totalTime)}</td>
                <td style="border:1px solid #000;padding:8px;${totalTimeColor}">${formatTime(row.avgTime)}</td>
            </tr>`;
        });
        const totalTimeColorAll = summary.overallIsLateTime ? 'color:red;' : '';
        const scoreColorAll = summary.overallIsLowScore ? 'color:red;' : '';
        tableHtml += `<tr style="font-weight:bold;">
            <td style="border:1px solid #000;padding:8px;">-</td>
            <td style="border:1px solid #000;padding:8px;">All Subjects</td>
            <td style="border:1px solid #000;padding:8px;">${summary.grandTotalExamCount}</td>
            <td style="border:1px solid #000;padding:8px;">${summary.grandTotalQuestions}</td>
            <td style="border:1px solid #000;padding:8px;${scoreColorAll}">${summary.grandTotalScore}</td>
            <td style="border:1px solid #000;padding:8px;">-</td>
            <td style="border:1px solid #000;padding:8px;${scoreColorAll}">${summary.overallPercentage.toFixed(1)}</td>
            <td style="border:1px solid #000;padding:8px;${totalTimeColorAll}">${formatTime(summary.grandTotalTime)}</td>
            <td style="border:1px solid #000;padding:8px;">-</td>
        </tr></tbody>`;
        return tableHtml;
    }

    function renderDashboard() {
        const historyRaw = getUserExamHistory();
        if (historyRaw.length === 0) {
            document.getElementById("dynamicContent").innerHTML = `
                <div class="empty-state">
                    <div class="empty-header">
                        <span class="back-chevron" onclick="navigateTo('home.html')">‹</span>
                        <h3>Dashboard</h3>
                        <span></span>
                    </div>
                    <div class="empty-content">
                        <p>No exam history yet.<br>Take an exam to see your performance charts.</p>
                        <button class="empty-btn" onclick="navigateTo('exams.html')">Take an Exam</button>
                    </div>
                </div>
            `;
            return;
        }
        let selectedRange = getUserDashboardRange();
        let selectedCategory = getUserDashboardCategory();
        const rangeNames = { 'lastday':'Last day', 'last7days':'Last 7 days', 'last30days':'Last 30 days' };
        const categoryNames = { 'national':'National/Ministry/Exit', 'school':'School/Institution Standard' };

        function renderDashboardWithRangeAndCategory(range, category) {
            const filtered = filterHistory(range, category, historyRaw);
            if (filtered.length === 0) {
                document.getElementById("dynamicContent").innerHTML = `
                    <div>
                        <div class="dashboard-header">
                            <span class="back-chevron" onclick="navigateTo('home.html')">‹</span>
                            <h3>Dashboard</h3>
                            <div class="dashboard-controls">
                                <div class="custom-dropdown" id="categoryDropdown"><div class="dropdown-btn"><span id="selectedCategoryText">${categoryNames[category]}</span><span class="dropdown-arrow" id="categoryArrow">›</span></div><ul class="dropdown-list" id="categoryList"><li data-category="national">National/Ministry/Exit</li><li data-category="school">School/Institution Standard</li></ul></div>
                                <div class="custom-dropdown" id="timeDropdown"><div class="dropdown-btn"><span id="selectedRangeText">${rangeNames[range]}</span><span class="dropdown-arrow" id="timeArrow">›</span></div><ul class="dropdown-list" id="timeList"><li data-range="lastday">Last day</li><li data-range="last7days">Last 7 days</li><li data-range="last30days">Last 30 days</li></ul></div>
                            </div>
                        </div>
                        <div class="empty-content">
                            <p>No exams in this period.</p>
                            <button class="brand-btn" onclick="navigateTo('exams.html')">Take an Exam</button>
                        </div>
                    </div>
                `;
                attachDropdownEvents(range, category);
                return;
            }
            currentFiltered = filtered;
            const { subjects, avgScores, maxQuestions } = getSubjectAverageScores(filtered);
            currentSubjects = subjects; currentAvgScores = avgScores;
            const summary = getSubjectSummary(filtered);
            subjectOvertimeMap = {}; subjectLowScoreMap = {};
            summary.rows.forEach(row => {
                if (row.isLateTime) subjectOvertimeMap[row.subject] = true;
                if (row.isLowScore) subjectLowScoreMap[row.subject] = true;
            });

            let tableRowsHtml = '';
            summary.rows.forEach(row => {
                const totalTimeColor = row.isLateTime ? 'style="color:#ff4444;"' : '';
                const scoreColor = row.isLowScore ? 'class="red-text"' : '';
                tableRowsHtml += `<tr>
                    <td>${row.no}</td>
                    <td>${row.subject}</td>
                    <td>${row.examCount}</td>
                    <td>${row.totalQuestions}</td>
                    <td ${scoreColor}>${row.totalScore}</td>
                    <td ${scoreColor}>${row.avgScore.toFixed(1)}</td>
                    <td ${scoreColor}>${row.percentage.toFixed(1)}</td>
                    <td ${totalTimeColor}>${formatTime(row.totalTime)}</td>
                    <td ${totalTimeColor}>${formatTime(row.avgTime)}</td>
                </tr>`;
            });
            const totalTimeColorAll = summary.overallIsLateTime ? 'style="color:#ff4444;"' : '';
            const scoreColorAll = summary.overallIsLowScore ? 'class="red-text"' : '';
            tableRowsHtml += `<tr>
                <td>-</td>
                <td>All Subjects</td>
                <td>${summary.grandTotalExamCount}</td>
                <td>${summary.grandTotalQuestions}</td>
                <td ${scoreColorAll}>${summary.grandTotalScore}</td>
                <td>-</td>
                <td ${scoreColorAll}>${summary.overallPercentage.toFixed(1)}</td>
                <td ${totalTimeColorAll}>${formatTime(summary.grandTotalTime)}</td>
                <td>-</td>
            </tr>`;

            const html = `
                <div>
                    <div class="dashboard-header">
                        <span class="back-chevron" onclick="navigateTo('home.html')">‹</span>
                        <h3>Dashboard</h3>
                        <div class="dashboard-controls">
                            <div class="custom-dropdown" id="categoryDropdown"><div class="dropdown-btn"><span id="selectedCategoryText">${categoryNames[category]}</span><span class="dropdown-arrow" id="categoryArrow">›</span></div><ul class="dropdown-list" id="categoryList"><li data-category="national">National/Ministry/Exit</li><li data-category="school">School/Institution Standard</li></ul></div>
                            <div class="custom-dropdown" id="timeDropdown"><div class="dropdown-btn"><span id="selectedRangeText">${rangeNames[range]}</span><span class="dropdown-arrow" id="timeArrow">›</span></div><ul class="dropdown-list" id="timeList"><li data-range="lastday">Last day</li><li data-range="last7days">Last 7 days</li><li data-range="last30days">Last 30 days</li></ul></div>
                        </div>
                    </div>

                    <div class="chart-card">
                        <p class="section-label">Average Score by Subject</p>
                        <canvas id="subjectChart" width="400" height="200" style="max-width:100%;height:auto;"></canvas>
                    </div>

                    <div id="lineChartContainer" class="chart-card">
                        <p class="section-label">Exam Scores Trend</p>
                        <canvas id="trendChart" width="400" height="200" style="max-width:100%;height:auto;"></canvas>
                    </div>

                    <div class="table-card">
                        <p class="section-label">Subject Performance Summary</p>
                        <table class="summary-table">
                            <thead><tr>
                                <th>No.</th><th>Subject</th><th>Exams</th><th>Total Q</th>
                                <th>Total Score</th><th>Avg Score</th><th>%</th>
                                <th>Total Time</th><th>Avg Time</th>
                            </tr></thead>
                            <tbody>${tableRowsHtml}</tbody>
                        </table>
                    </div>

                    <div style="display:flex;justify-content:space-between;align-items:center;margin:4px 0 24px;gap:10px;">
                        <button onclick="navigateTo('exams.html')" class="back-btn">‹ Back to Exams</button>
                        <button class="print-btn" id="printReportBtn">Print Report</button>
                    </div>
                </div>
            `;
            document.getElementById("dynamicContent").innerHTML = html;
            createBarChart(subjects, avgScores, maxQuestions, -1);

            const lineCont = document.getElementById('lineChartContainer');
            lineCont.classList.remove('show');

            attachDropdownEvents(range, category);
            document.getElementById('printReportBtn').addEventListener('click', printReport);
        }

        function attachDropdownEvents(currentRange, currentCategory) {
            const catDropdown = document.getElementById('categoryDropdown');
            const catList = document.getElementById('categoryList');
            const catArrow = document.getElementById('categoryArrow');
            if (catDropdown && catList) {
                catDropdown.querySelector('.dropdown-btn').addEventListener('click', (e) => { e.stopPropagation(); catList.classList.toggle('show'); if (catArrow) catArrow.classList.toggle('open', catList.classList.contains('show')); });
                document.querySelectorAll('#categoryList li').forEach(li => {
                    li.addEventListener('click', (e) => { e.stopPropagation(); const newCat = li.getAttribute('data-category'); setUserDashboardCategory(newCat); document.getElementById('selectedCategoryText').innerText = li.innerText; catList.classList.remove('show'); if (catArrow) catArrow.classList.remove('open'); renderDashboardWithRangeAndCategory(getUserDashboardRange(), newCat); });
                });
            }
            const timeDropdown = document.getElementById('timeDropdown');
            const timeList = document.getElementById('timeList');
            const timeArrow = document.getElementById('timeArrow');
            if (timeDropdown && timeList) {
                timeDropdown.querySelector('.dropdown-btn').addEventListener('click', (e) => { e.stopPropagation(); timeList.classList.toggle('show'); if (timeArrow) timeArrow.classList.toggle('open', timeList.classList.contains('show')); });
                document.querySelectorAll('#timeList li').forEach(li => {
                    li.addEventListener('click', (e) => { e.stopPropagation(); const newRange = li.getAttribute('data-range'); setUserDashboardRange(newRange); document.getElementById('selectedRangeText').innerText = li.innerText; timeList.classList.remove('show'); if (timeArrow) timeArrow.classList.remove('open'); renderDashboardWithRangeAndCategory(newRange, getUserDashboardCategory()); });
                });
            }
            document.addEventListener('click', function closeDropdowns(e) {
                if (catDropdown && !catDropdown.contains(e.target) && catList && !catList.contains(e.target)) { catList.classList.remove('show'); if (catArrow) catArrow.classList.remove('open'); }
                if (timeDropdown && !timeDropdown.contains(e.target) && timeList && !timeList.contains(e.target)) { timeList.classList.remove('show'); if (timeArrow) timeArrow.classList.remove('open'); }
            });
        }

        renderDashboardWithRangeAndCategory(selectedRange, selectedCategory);
    }

    renderDashboard();
</script>
</body>
</html>
