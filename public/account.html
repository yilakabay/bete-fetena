<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bete Fetena - Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... (keep all existing account page styles, unchanged) ... */
        *{margin:0;padding:0;box-sizing:border-box}
        :root {
            --bg-body: #f0ece4;
            --bg-sidebar: #fdf9f4;
            --sidebar-text: #1a1200;
            --text-primary: #1a1200;
            --card-bg: #ffffff;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.12);
            --btn-bg: #00008B;
            --btn-hover: #FFA500;
            --cat-bg: #f5f0e8;
            --option-bg: #ede8df;
            --border-light: rgba(0,0,0,0.1);
            --gold: #FFA500;
            --navy: #00008B;
            --ink: #1a1200;
            --cream: #fdf9f4;
            --grain-opacity: 0.04;
        }
        body.dark {
            --bg-body: #0d0b07;
            --bg-sidebar: #13110c;
            --sidebar-text: #FFA500;
            --text-primary: #f0e8d0;
            --card-bg: #1a1610;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
            --btn-bg: #FFA500;
            --btn-hover: #00008B;
            --cat-bg: #1e1a12;
            --option-bg: #211d14;
            --border-light: rgba(255,255,255,0.08);
            --gold: #FFA500;
            --navy: #6688ff;
            --ink: #f0e8d0;
            --cream: #13110c;
            --grain-opacity: 0.06;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9999;
        }
        .sidebar {
            height:100%;width:0;position:fixed;top:0;left:0;
            background:var(--bg-sidebar);overflow-x:hidden;
            transition:0.35s cubic-bezier(0.4,0,0.2,1);
            padding-top:80px;z-index:1000;
            box-shadow:4px 0 40px rgba(0,0,0,0.15);
            border-right:1px solid var(--border-light);
        }
        .sidebar a {
            padding:14px 28px;text-decoration:none;
            font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;
            letter-spacing:0.03em;color:var(--sidebar-text);
            display:flex;align-items:center;
            transition:background 0.2s, padding-left 0.2s;
        }
        .sidebar a:hover{background:rgba(255,165,0,0.08);padding-left:36px;}
        .sidebar .closebtn{position:absolute;top:16px;right:24px;font-size:28px;color:var(--sidebar-text);padding:0 !important;}
        .sidebar .closebtn:hover{background:transparent !important;padding-left:0 !important;}
        .sidebar .logout{color:#e05555;margin-top:30px;border-top:1px solid var(--border-light);}
        body.dark .sidebar .logout{border-top-color:rgba(255,255,255,0.08);}
        .main{padding:0 16px}
        .top-bar {
            display:flex;align-items:center;justify-content:space-between;
            gap:4px;padding:14px 0;
            border-bottom:1px solid var(--border-light);
            min-height:74px;position:relative;
        }
        .top-bar::after {
            content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
            background:linear-gradient(90deg,transparent,var(--gold),transparent);
            opacity:0.5;
        }
        .openbtn {
            font-size:30px;cursor:pointer;background:transparent;border:none;
            padding:6px;border-radius:8px;
            display:flex;align-items:center;justify-content:center;
            transition:background 0.2s;
        }
        .openbtn:hover{background:rgba(255,165,0,0.1);}
        .openbtn img{width:28px;height:28px;}
        .logo-area{text-align:center;flex-grow:1}
        .logo-area h1{
            font-family:'Cinzel',serif;font-size:1.7rem;font-weight:700;
            margin:0;line-height:1.2;letter-spacing:0.05em;
        }
        .logo-area h1 .bete{color:var(--navy)}
        .logo-area h1 .fetena{color:var(--gold)}
        .logo-area p{color:var(--text-primary);opacity:0.6;font-size:0.72rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;}
        img#logoImg{height:40px;margin-right:4px;vertical-align:middle}
        .content-area{background:transparent;padding:0;margin-top:0;min-height:300px}
        .account-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px 20px 32px;
            margin-top: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            position: relative; overflow: hidden;
            animation: fadeSlideUp 0.5s cubic-bezier(0.34,1.2,0.64,1) forwards;
        }
        .account-container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--navy), var(--gold));
        }
        .account-header {
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom: 28px;
            position: relative;
        }
        .account-header h3 {
            font-family: 'Cinzel', serif;
            margin:0;font-size:1.4rem;font-weight:700;
            flex:1;text-align:center;letter-spacing:0.08em;
        }
        .back-chevron {
            font-size:1.8rem;cursor:pointer;color:var(--text-primary);
            width:36px;line-height:1;opacity:0.5;transition:opacity 0.2s;
        }
        .back-chevron:hover{opacity:1;}
        .left-buttons{display:flex;align-items:center;gap:8px;margin-right:4px;}
        .icon-btn {
            background:none;border:1px solid var(--border-light);
            cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
            padding:7px;border-radius:50%;
            transition:border-color 0.2s, background 0.2s;
        }
        .icon-btn:hover{border-color:var(--gold);background:rgba(255,165,0,0.08);}
        .icon-btn img{width:18px;height:18px;}
        .chevron-btn {
            background:none;border:none;font-size:1.2rem;cursor:pointer;
            color:var(--text-primary);transition:transform 0.2s, color 0.2s;
            padding:0 2px;opacity:0.5;
        }
        .chevron-btn:hover{opacity:1;color:var(--gold);}
        .chevron-btn.rotated{transform:rotate(90deg);opacity:1;color:var(--btn-bg);}
        .profile-pic-container {
            display:flex;flex-direction:column;align-items:center;
            margin-bottom: 32px;position:relative;
        }
        .profile-pic-ring {
            position: relative;
            padding: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--navy), var(--gold));
            display: inline-block;
        }
        .profile-pic {
            width:110px;height:110px;
            border-radius:50%;object-fit:cover;
            border:3px solid var(--card-bg);
            background:var(--cat-bg);
            display: block;
        }
        .edit-pic-btn {
            position:absolute;bottom:2px;right:2px;
            background: linear-gradient(135deg, var(--navy), #0000c8);
            border-radius:50%;width:30px;height:30px;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;border:2px solid var(--card-bg);
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .edit-pic-btn:hover{transform: scale(1.1);}
        .edit-pic-btn img{width:14px;height:14px;filter:brightness(0) invert(1) !important;}
        body.dark .edit-pic-btn{background:linear-gradient(135deg,#FFA500,#ff8800);}
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-light), transparent);
            margin: 20px 0;
        }
        .section-label {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;letter-spacing: 0.2em;
            text-transform: uppercase;opacity: 0.35;
            display: block;margin-bottom: 16px;
        }
        .account-field {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--cat-bg);
            border-radius: 14px;
            border: 1px solid var(--border-light);
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .account-field:hover{border-color: rgba(255,165,0,0.3);}
        .account-field label {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;letter-spacing: 0.15em;
            text-transform: uppercase;opacity: 0.5;
            min-width: 70px;flex-shrink: 0;
        }
        .account-field span {
            font-size: 1rem;font-weight: 500;flex: 1;
        }
        .account-field input {
            background: transparent;
            border: none;outline: none;
            font-size: 1rem;font-weight: 500;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            flex: 1;width: 100%;
        }
        .account-field input::placeholder{opacity:0.4;}
        .account-field.editable {
            background: var(--option-bg);
            border-color: rgba(255,165,0,0.25);
        }
        .account-field.editable:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255,165,0,0.1);
        }
        .plan-badge-free {
            display: inline-block;
            background: linear-gradient(135deg, #b0c8e8, #d0e3ff);
            color: #1B2F5E;
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;font-weight:700;letter-spacing:0.1em;
            padding: 4px 14px;border-radius: 30px;
        }
        .plan-badge-zgju {
            display: inline-block;
            background: linear-gradient(135deg, #1a1f3c, #0d1130);
            color: #FFA500;border: 1px solid rgba(255,165,0,0.4);
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;font-weight:700;letter-spacing:0.1em;
            padding: 4px 14px;border-radius: 30px;
        }
        .plan-badge-qeleme {
            display: inline-block;
            background: linear-gradient(135deg, #0c0a06, #1a1400);
            color: #FFD700;border: 1px solid rgba(255,215,0,0.45);
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;font-weight:700;letter-spacing:0.1em;
            padding: 4px 14px;border-radius: 30px;
        }
        .eye-toggle {
            background:none;border:none;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            padding:4px;border-radius:8px;
            transition: background 0.2s;
        }
        .eye-toggle:hover{background:rgba(255,165,0,0.1);}
        .eye-toggle img{width:18px;height:18px;}
        .update-btn {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--btn-bg), #0000c8);
            color: white;border: none;
            padding: 12px 28px;border-radius: 40px;
            cursor: pointer;margin-top: 20px;
            font-weight: 700;font-size: 0.95rem;
            letter-spacing: 0.06em;
            box-shadow: 0 4px 16px rgba(0,0,139,0.25);
            transition: transform 0.2s, opacity 0.2s;
            width: 100%;
        }
        .update-btn:hover{transform:translateY(-2px);opacity:0.9;}
        .update-btn:disabled, .update-btn.disabled {
            opacity: 0.35;pointer-events:none;transform:none;
        }
        body.dark .update-btn {
            background: linear-gradient(135deg,#FFA500,#ff8800);
            box-shadow: 0 4px 16px rgba(255,165,0,0.3);
        }
        .change-pw-btn {
            font-family: 'Outfit', sans-serif;
            background: transparent;
            border: 1.5px solid var(--btn-bg);
            color: var(--btn-bg);
            padding: 9px 22px;border-radius: 40px;
            cursor: pointer;font-weight: 700;font-size: 0.88rem;
            letter-spacing: 0.04em;
            transition: background 0.2s, transform 0.2s;
        }
        .change-pw-btn:hover{background:rgba(0,0,139,0.07);transform:translateY(-1px);}
        body.dark .change-pw-btn{border-color:var(--gold);color:var(--gold);}
        body.dark .change-pw-btn:hover{background:rgba(255,165,0,0.08);}
        .delete-account {
            display: inline-flex;align-items:center;gap:6px;
            color: #e05555;
            font-size: 0.85rem;font-weight:600;
            cursor: pointer;font-family:'Outfit',sans-serif;
            letter-spacing:0.03em;
            padding: 6px 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, opacity 0.2s;
            margin-top: 24px;
        }
        .delete-account:hover{border-bottom-color:#e05555;opacity:0.8;}
        .custom-modal {
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(6px);
            display:flex;align-items:center;justify-content:center;z-index:10000;
        }
        .modal-content {
            background:var(--card-bg);border-radius:24px;
            padding:28px 24px;width:90%;max-width:360px;
            text-align:center;color:var(--text-primary);
            box-shadow:0 24px 60px rgba(0,0,0,0.35);
            border:1px solid var(--border-light);
            animation:fadeInScale 0.25s cubic-bezier(0.34,1.2,0.64,1);
        }
        .modal-content h4{
            font-family:'Cinzel',serif;font-size:1.1rem;
            font-weight:700;letter-spacing:0.08em;margin-bottom:16px;
        }
        .modal-content input {
            width:100%;padding:11px 16px;margin:7px 0;
            border:1px solid var(--border-light);border-radius:30px;
            background:var(--option-bg);color:var(--text-primary);
            font-family:'Outfit',sans-serif;font-size:0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }
        .modal-content input:focus{border-color:var(--gold);}
        .modal-buttons{display:flex;gap:10px;justify-content:center;margin-top:18px;}
        .modal-buttons button {
            padding:10px 24px;border-radius:30px;border:none;
            cursor:pointer;font-weight:700;
            font-family:'Outfit',sans-serif;font-size:0.9rem;
            transition:transform 0.1s;
        }
        .modal-buttons button:active{transform:scale(0.97);}
        .modal-confirm{background:var(--btn-bg);color:white;}
        body.dark .modal-confirm{background:var(--gold);color:#0d0b07;}
        .modal-cancel{background:var(--option-bg);color:var(--text-primary);border:1px solid var(--border-light);}
        @keyframes fadeInScale{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
        .account-dropdown {
            position:absolute;top:calc(100% + 8px);left:0;
            background:var(--card-bg);
            border-radius:20px;
            box-shadow:0 8px 40px rgba(0,0,0,0.2);
            min-width:240px;z-index:100;
            padding:10px 0;
            border:1px solid var(--border-light);
            animation:fadeInScale 0.2s cubic-bezier(0.34,1.2,0.64,1);
        }
        .account-item {
            display:flex;align-items:center;gap:12px;
            padding:10px 18px;cursor:pointer;
            transition:background 0.2s;
        }
        .account-item:hover{background:var(--option-bg);}
        .account-item-img {
            width:36px;height:36px;border-radius:50%;
            object-fit:cover;border:2px solid var(--border-light);
        }
        .account-item-name{font-size:0.9rem;font-weight:500;}
        .add-account-btn {
            font-family:'Outfit',sans-serif;
            background:transparent;color:var(--btn-bg);
            border:1.5px solid var(--btn-bg);
            width:calc(100% - 32px);margin:8px 16px;padding:9px;
            border-radius:40px;cursor:pointer;font-weight:700;font-size:0.88rem;
            transition:background 0.2s, transform 0.2s;
        }
        .add-account-btn:hover{background:rgba(0,0,139,0.05);transform:translateY(-1px);}
        body.dark .add-account-btn{border-color:var(--gold);color:var(--gold);}
        body.dark .add-account-btn:hover{background:rgba(255,165,0,0.08);}
        .account-list-modal .account-item{
            border-radius:14px;margin:4px 8px;
            padding:10px 12px;
        }
        .account-list-modal .account-item-img{width:42px;height:42px;}
        .crop-modal {
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.88);
            display:flex;align-items:center;justify-content:center;
            z-index:20000;touch-action:none;
            backdrop-filter:blur(8px);
        }
        .crop-container {
            background:var(--card-bg);border-radius:24px;
            padding:24px 20px;width:95%;max-width:480px;
            text-align:center;border:1px solid var(--border-light);
            box-shadow:0 24px 80px rgba(0,0,0,0.5);
        }
        .crop-container h3{
            font-family:'Cinzel',serif;font-size:1.1rem;
            letter-spacing:0.08em;margin-bottom:16px;
        }
        .crop-canvas-wrapper {
            position:relative;width:100%;aspect-ratio:1/1;
            background:#111;border-radius:50%;overflow:hidden;
            margin-bottom:18px;touch-action:none;
        }
        canvas#cropCanvas{width:100%;height:100%;display:block;touch-action:none}
        .crop-controls{display:flex;justify-content:space-between;gap:14px;}
        .crop-controls button {
            flex:1;padding:11px;border-radius:40px;
            font-weight:700;font-size:0.95rem;
            font-family:'Outfit',sans-serif;border:none;cursor:pointer;
            transition:transform 0.15s;
        }
        .crop-controls button:hover{transform:translateY(-1px);}
        .password-section{margin-top:4px;}
        .password-section .account-field{margin-bottom:10px;}
        .bottom-action-row{
            display:flex;align-items:center;justify-content:space-between;
            flex-wrap:wrap;gap:12px;
            margin-top:8px;
        }
        .sidebar a img,.openbtn img {
            filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;
        }
        body.dark .sidebar a img,body.dark .openbtn img {
            filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;
        }
        .eye-toggle img,.icon-btn img {
            filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;
        }
        body.dark .eye-toggle img,body.dark .icon-btn img {
            filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;
        }
        .edit-pic-btn img{filter:brightness(0) invert(1) !important;}
        @keyframes fadeSlideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:768px){
            .openbtn{padding:6px 8px}
            .top-bar{min-height:60px;padding:8px 0}
            img#logoImg{height:32px}
            .logo-area h1{font-size:1.3rem}
            .logo-area p{font-size:0.65rem}
            .account-field label{min-width:58px;font-size:0.6rem;}
            .profile-pic{width:90px;height:90px;}
        }
    </style>
</head>
<body>
<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div id="sidebarLinks"></div>
    <a href="#" id="darkModeToggle" style="display:flex;align-items:center;">
        <img id="darkModeIcon" src="Moon.png" style="width:24px;height:24px;margin-right:12px;">
        <span id="darkModeText">Dark Mode</span>
    </a>
    <a href="#" class="logout" onclick="confirmLogout()" style="display:flex;align-items:center;">
        <img src="Logout.png" style="width:24px;height:24px;margin-right:12px;">
        Logout
    </a>
</div>
<div id="main" class="main">
    <div class="top-bar">
        <button class="openbtn" onclick="openNav()">
            <img src="Menu.png" alt="Menu">
        </button>
        <img id="logoImg" src="Bete_Fetena_Logo.png" alt="Logo" style="height:40px;margin-right:2px;vertical-align:middle;">
        <div class="logo-area">
            <h1><span class="bete">Bete</span><span class="fetena"> Fetena</span></h1>
            <p>Examine Yourself, Show Who You Are.</p>
        </div>
    </div>
    <div id="dynamicContent" class="content-area"></div>
</div>
<script src="shared.js"></script>
<script>
    // Account page with full backend integration
    const API_BASE_URL = window.API_BASE_URL || 'https://bete-fetena-backend.onrender.com';
    let currentUserData = null;

    async function loadAccountData() {
        if (!checkAuth()) return;
        const phone = getUserPhone();
        const accountId = getCurrentAccountId();
        if (!phone || !accountId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/api/users/getData`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, accountId })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            currentUserData = { phone, account: data.account };
            renderAccount();
        } catch (err) {
            showMessageModal('Error loading account: ' + err.message);
        }
    }

    function getPlanBadgeHtml(plan) {
        if (plan === 'zgju') return '<span class="plan-badge-zgju">Zgju</span>';
        if (plan === 'qeleme') return '<span class="plan-badge-qeleme">✦ Qeleme</span>';
        return '<span class="plan-badge-free">Free</span>';
    }

    function maskPhone(phone) {
        if (!phone) return '';
        if (phone.length <= 6) return phone;
        return phone.substring(0,4) + '•'.repeat(phone.length-7) + phone.substring(phone.length-3);
    }

    function renderAccount() {
        if (!currentUserData) return;
        const user = currentUserData.account;
        const plan = user.plan || 'free';
        const displayName = (user.name && user.father) ? `${user.name} ${user.father}` : 'Not set';
        const maskedPhone = maskPhone(currentUserData.phone);
        const profilePic = user.profilePic || 'default-avatar.png';
        const html = `
            <div class="account-container">
                <div class="account-header">
                    <span class="back-chevron" onclick="navigateTo('home.html')">‹</span>
                    <div class="left-buttons">
                        <button class="icon-btn" onclick="toggleAccountDropdown()"><img src="Account.png" alt="Switch Account"></button>
                        <button class="chevron-btn" onclick="toggleAccountDropdown()">›</button>
                    </div>
                    <h3>Account</h3>
                    <button class="icon-btn" onclick="renderAccountEditMode()"><img src="Pen.png" alt="Edit Info"></button>
                </div>
                <div class="profile-pic-container">
                    <div class="profile-pic-ring">
                        <img id="profileImg" class="profile-pic" src="${profilePic}" alt="Profile" onerror="this.src='default-avatar.png'">
                        <div class="edit-pic-btn" onclick="showProfilePicMenu()"><img src="Pen.png" alt="Edit"></div>
                    </div>
                </div>
                <span class="section-label">Account Details</span>
                <div class="account-field">
                    <label>Phone</label>
                    <span id="phoneDisplaySpan">${maskedPhone}</span>
                    <button class="eye-toggle" id="phoneEyeToggle"><img src="Eye.png" alt="Show" id="eyeIcon"></button>
                </div>
                <div class="account-field"><label>Name</label><span>${displayName}</span></div>
                <div class="account-field"><label>Plan</label><span>${getPlanBadgeHtml(plan)}</span></div>
                <div class="section-divider"></div>
                <div class="bottom-action-row">
                    <button class="change-pw-btn" onclick="renderPasswordChangeMode()">Change Password</button>
                    <span class="delete-account" onclick="showDeleteAccountSelector()">⚠ Delete Account</span>
                </div>
            </div>`;
        document.getElementById("dynamicContent").innerHTML = html;
        let phoneVisible = false;
        const eyeToggle = document.getElementById('phoneEyeToggle');
        if (eyeToggle) {
            eyeToggle.onclick = () => {
                phoneVisible = !phoneVisible;
                document.getElementById('phoneDisplaySpan').innerText = phoneVisible ? currentUserData.phone : maskedPhone;
                document.getElementById('eyeIcon').src = phoneVisible ? 'Slashed_Eye.png' : 'Eye.png';
            };
        }
    }

    async function renderAccountEditMode() {
        if (!currentUserData) return;
        const user = currentUserData.account;
        const html = `
            <div class="account-container">
                <div class="account-header">
                    <span class="back-chevron" onclick="loadAccountData()">‹</span>
                    <h3>Edit Account</h3>
                    <span style="width:36px;"></span>
                </div>
                <span class="section-label">Update Information</span>
                <div class="account-field editable"><label>Phone</label><input type="tel" id="editPhone" value="${currentUserData.phone}"></div>
                <div class="account-field editable"><label>Name</label><input type="text" id="editName" value="${user.name || ''}" placeholder="Name" maxlength="21"></div>
                <div class="account-field editable"><label>Father</label><input type="text" id="editFather" value="${user.father || ''}" placeholder="Father's Name" maxlength="21"></div>
                <div class="account-field editable"><label>Grand</label><input type="text" id="editGrand" value="${user.grand || ''}" placeholder="Grandfather's Name" maxlength="21"></div>
                <button class="update-btn disabled" id="updateInfoBtn" disabled>Update Information</button>
            </div>`;
        document.getElementById("dynamicContent").innerHTML = html;
        const btn = document.getElementById('updateInfoBtn');
        const phoneInput = document.getElementById('editPhone');
        const nameInput = document.getElementById('editName');
        const fatherInput = document.getElementById('editFather');
        const grandInput = document.getElementById('editGrand');
        const origPhone = currentUserData.phone, origName = user.name || '', origFather = user.father || '', origGrand = user.grand || '';
        function checkChanges() {
            const changed = (phoneInput.value.trim() !== origPhone) || (nameInput.value.trim() !== origName) || (fatherInput.value.trim() !== origFather) || (grandInput.value.trim() !== origGrand);
            btn.disabled = !changed;
            btn.classList.toggle('disabled', !changed);
        }
        phoneInput.addEventListener('input', checkChanges);
        nameInput.addEventListener('input', checkChanges);
        fatherInput.addEventListener('input', checkChanges);
        grandInput.addEventListener('input', checkChanges);
        btn.onclick = async () => {
            const newPhoneRaw = phoneInput.value.trim();
            function normalizePhone(p) {
                let ph = p.trim();
                if (/^09[0-9]{8}$/.test(ph)) return '+251' + ph.substring(1);
                if (/^07[0-9]{8}$/.test(ph)) return '+251' + ph.substring(1);
                if (/^\+251[79][0-9]{8}$/.test(ph)) return ph;
                if (/^251[79][0-9]{8}$/.test(ph)) return '+' + ph;
                return null;
            }
            const newPhone = normalizePhone(newPhoneRaw);
            if (!newPhone) { showMessageModal("Invalid phone number."); return; }
            const newName = nameInput.value.trim();
            const newFather = fatherInput.value.trim();
            const newGrand = grandInput.value.trim();
            if (!newName || !newFather) { showMessageModal("Name and Father's Name are required."); return; }
            showPromptModal("Confirm Changes", "Enter your password", async (password) => {
                if (!password) return;
                try {
                    // First, verify password via login endpoint
                    const verifyRes = await fetch(`${API_BASE_URL}/api/users/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: currentUserData.phone, password })
                    });
                    if (!verifyRes.ok) throw new Error("Incorrect password");
                    // Update account via updateAccount endpoint
                    const updates = { name: newName, father: newFather, grand: newGrand };
                    if (newPhone !== currentUserData.phone) {
                        // For simplicity, we handle phone change by logging out and requiring re-login
                        // (backend would need to support phone change; currently not implemented in server.js)
                        showMessageModal("Phone number change is not yet supported. Please contact support.");
                        return;
                    }
                    const updateRes = await fetch(`${API_BASE_URL}/api/users/updateAccount`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: currentUserData.phone, accountId: getCurrentAccountId(), updates })
                    });
                    if (!updateRes.ok) throw new Error("Update failed");
                    showMessageModal("Account updated successfully.", () => loadAccountData());
                } catch (err) {
                    showMessageModal(err.message);
                }
            });
        };
    }

    async function renderPasswordChangeMode() {
        if (!currentUserData) return;
        const html = `
            <div class="account-container">
                <div class="account-header">
                    <span class="back-chevron" onclick="loadAccountData()">‹</span>
                    <h3>Change Password</h3>
                    <span style="width:36px;"></span>
                </div>
                <span class="section-label">Update Password</span>
                <div class="password-section">
                    <div class="account-field editable"><label>Old</label><input type="password" id="oldPw" placeholder="Current password" maxlength="6"></div>
                    <div class="account-field editable"><label>New</label><input type="password" id="newPw" placeholder="New 6-digit password" maxlength="6"></div>
                    <div class="account-field editable"><label>Confirm</label><input type="password" id="confirmPw" placeholder="Confirm new password" maxlength="6"></div>
                </div>
                <button class="update-btn" id="updatePwBtn">Update Password</button>
            </div>`;
        document.getElementById("dynamicContent").innerHTML = html;
        document.getElementById('updatePwBtn').onclick = async () => {
            const oldPw = document.getElementById('oldPw').value.trim();
            const newPw = document.getElementById('newPw').value.trim();
            const confirmPw = document.getElementById('confirmPw').value.trim();
            if (!oldPw || !newPw || !confirmPw) { showMessageModal("Fill all fields."); return; }
            if (!/^\d{6}$/.test(newPw)) { showMessageModal("Password must be 6 digits."); return; }
            if (newPw !== confirmPw) { showMessageModal("Passwords don't match."); return; }
            try {
                const res = await fetch(`${API_BASE_URL}/api/users/changePassword`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentUserData.phone, accountId: getCurrentAccountId(), oldPassword: oldPw, newPassword: newPw })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showMessageModal("Password changed. Please log in again.", () => logout());
            } catch (err) {
                showMessageModal(err.message);
            }
        };
    }

    async function showDeleteAccountSelector() {
        if (!currentUserData) return;
        // Simple confirm password modal
        showPromptModal("Delete Account", "Enter your password", async (password) => {
            if (!password) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/users/deleteAccount`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentUserData.phone, accountId: getCurrentAccountId(), password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showMessageModal("Account deleted. You will be logged out.", () => logout());
            } catch (err) {
                showMessageModal(err.message);
            }
        });
    }

    // Cropper, profile picture functions (unchanged, rely on localStorage for now) – you can keep them as they were.
    // For brevity, I omit them here; they can be copied from your original account.html.

    // Initialize
    initDarkMode();
    buildSidebar('account');
    loadAccountData();
</script>
