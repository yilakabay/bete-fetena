<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bete Fetena - Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --bg-body: #f0ece4;
            --bg-sidebar: #fdf9f4;
            --sidebar-text: #1a1200;
            --text-primary: #1a1200;
            --card-bg: #ffffff;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.12);
            --btn-bg: #00008B;
            --btn-hover: #FFA500;
            --cat-bg: #f5f0e8;
            --option-bg: #ede8df;
            --border-light: rgba(0,0,0,0.1);
            --gold: #FFA500;
            --navy: #00008B;
            --ink: #1a1200;
            --cream: #fdf9f4;
            --grain-opacity: 0.04;
        }
        body.dark {
            --bg-body: #0d0b07;
            --bg-sidebar: #13110c;
            --sidebar-text: #FFA500;
            --text-primary: #f0e8d0;
            --card-bg: #1a1610;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
            --btn-bg: #FFA500;
            --btn-hover: #00008B;
            --cat-bg: #1e1a12;
            --option-bg: #211d14;
            --border-light: rgba(255,255,255,0.08);
            --gold: #FFA500;
            --navy: #6688ff;
            --ink: #f0e8d0;
            --cream: #13110c;
            --grain-opacity: 0.06;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9999;
        }

        .sidebar {
            height:100%;width:0;position:fixed;top:0;left:0;
            background:var(--bg-sidebar);overflow-x:hidden;
            transition:0.35s cubic-bezier(0.4,0,0.2,1);
            padding-top:80px;z-index:1000;
            box-shadow:4px 0 40px rgba(0,0,0,0.15);
            border-right:1px solid var(--border-light);
        }
        .sidebar a {
            padding:14px 28px;text-decoration:none;
            font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;
            letter-spacing:0.03em;color:var(--sidebar-text);
            display:flex;align-items:center;
            transition:background 0.2s, padding-left 0.2s;
        }
        .sidebar a:hover{background:rgba(255,165,0,0.08);padding-left:36px;}
        .sidebar .closebtn{position:absolute;top:16px;right:24px;font-size:28px;color:var(--sidebar-text);padding:0 !important;}
        .sidebar .closebtn:hover{background:transparent !important;padding-left:0 !important;}
        .sidebar .logout{color:#e05555;margin-top:30px;border-top:1px solid var(--border-light);}
        body.dark .sidebar .logout{border-top-color:rgba(255,255,255,0.08);}

        .main{padding:0 16px}
        .top-bar {
            display:flex;align-items:center;justify-content:space-between;
            gap:4px;padding:14px 0;
            border-bottom:1px solid var(--border-light);
            min-height:74px;position:relative;
        }
        .top-bar::after {
            content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
            background:linear-gradient(90deg,transparent,var(--gold),transparent);
            opacity:0.5;
        }
        .openbtn {
            font-size:30px;cursor:pointer;background:transparent;border:none;
            padding:6px;border-radius:8px;
            display:flex;align-items:center;justify-content:center;
            transition:background 0.2s;
        }
        .openbtn:hover{background:rgba(255,165,0,0.1);}
        .openbtn img{width:28px;height:28px;}
        .logo-area{text-align:center;flex-grow:1}
        .logo-area h1{
            font-family:'Cinzel',serif;font-size:1.7rem;font-weight:700;
            margin:0;line-height:1.2;letter-spacing:0.05em;
        }
        .logo-area h1 .bete{color:var(--navy)}
        .logo-area h1 .fetena{color:var(--gold)}
        .logo-area p{color:var(--text-primary);opacity:0.6;font-size:0.72rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;}
        img#logoImg{height:40px;margin-right:4px;vertical-align:middle}

        .content-area{background:transparent;padding:0;margin-top:0;min-height:300px}

        .account-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px 20px 32px;
            margin-top: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            position: relative; overflow: hidden;
            animation: fadeSlideUp 0.5s cubic-bezier(0.34,1.2,0.64,1) forwards;
        }
        .account-container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--navy), var(--gold));
        }

        .account-header {
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom: 28px;
            position: relative;
        }
        .account-header h3 {
            font-family: 'Cinzel', serif;
            margin:0;font-size:1.4rem;font-weight:700;
            flex:1;text-align:center;letter-spacing:0.08em;
        }

        .back-chevron {
            font-size:1.8rem;cursor:pointer;color:var(--text-primary);
            width:36px;line-height:1;opacity:0.5;transition:opacity 0.2s;
        }
        .back-chevron:hover{opacity:1;}

        .left-buttons{display:flex;align-items:center;gap:8px;margin-right:4px;}
        .icon-btn {
            background:none;border:1px solid var(--border-light);
            cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
            padding:7px;border-radius:50%;
            transition:border-color 0.2s, background 0.2s;
        }
        .icon-btn:hover{border-color:var(--gold);background:rgba(255,165,0,0.08);}
        .icon-btn img{width:18px;height:18px;}

        .chevron-btn {
            background:none;border:none;font-size:1.2rem;cursor:pointer;
            color:var(--text-primary);transition:transform 0.2s, color 0.2s;
            padding:0 2px;opacity:0.5;
        }
        .chevron-btn:hover{opacity:1;color:var(--gold);}
        .chevron-btn.rotated{transform:rotate(90deg);opacity:1;color:var(--btn-bg);}

        .profile-pic-container {
            display:flex;flex-direction:column;align-items:center;
            margin-bottom: 32px;position:relative;
        }
        .profile-pic-ring {
            position: relative;
            padding: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--navy), var(--gold));
            display: inline-block;
        }
        .profile-pic {
            width:110px;height:110px;
            border-radius:50%;object-fit:cover;
            border:3px solid var(--card-bg);
            background:var(--cat-bg);
            display: block;
        }
        .edit-pic-btn {
            position:absolute;bottom:2px;right:2px;
            background: linear-gradient(135deg, var(--navy), #0000c8);
            border-radius:50%;width:30px;height:30px;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;border:2px solid var(--card-bg);
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .edit-pic-btn:hover{transform: scale(1.1);}
        .edit-pic-btn img{width:14px;height:14px;filter:brightness(0) invert(1) !important;}
        body.dark .edit-pic-btn{background:linear-gradient(135deg,#FFA500,#ff8800);}

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-light), transparent);
            margin: 20px 0;
        }
        .section-label {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;letter-spacing: 0.2em;
            text-transform: uppercase;opacity: 0.35;
            display: block;margin-bottom: 16px;
        }

        .account-field {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--cat-bg);
            border-radius: 14px;
            border: 1px solid var(--border-light);
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .account-field:hover{border-color: rgba(255,165,0,0.3);}
        .account-field label {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;letter-spacing: 0.15em;
            text-transform: uppercase;opacity: 0.5;
            min-width: 70px;flex-shrink: 0;
        }
        .account-field span {
            font-size: 1rem;font-weight: 500;flex: 1;
        }
        .account-field input {
            background: transparent;
            border: none;outline: none;
            font-size: 1rem;font-weight: 500;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            flex: 1;width: 100%;
        }
        .account-field input::placeholder{opacity:0.4;}

        .account-field.editable {
            background: var(--option-bg);
            border-color: rgba(255,165,0,0.25);
        }
        .account-field.editable:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255,165,0,0.1);
        }

        .plan-badge-free {
            display: inline-block;
            background: linear-gradient(135deg, #b0c8e8, #d0e3ff);
            color: #1B2F5E;
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;font-weight:700;letter-spacing:0.1em;
            padding: 4px 14px;border-radius: 30px;
        }
        .plan-badge-zgju {
            display: inline-block;
            background: linear-gradient(135deg, #1a1f3c, #0d1130);
            color: #FFA500;border: 1px solid rgba(255,165,0,0.4);
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;font-weight:700;letter-spacing:0.1em;
            padding: 4px 14px;border-radius: 30px;
        }
        .plan-badge-qeleme {
            display: inline-block;
            background: linear-gradient(135deg, #0c0a06, #1a1400);
            color: #FFD700;border: 1px solid rgba(255,215,0,0.45);
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;font-weight:700;letter-spacing:0.1em;
            padding: 4px 14px;border-radius: 30px;
        }

        .eye-toggle {
            background:none;border:none;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            padding:4px;border-radius:8px;
            transition: background 0.2s;
        }
        .eye-toggle:hover{background:rgba(255,165,0,0.1);}
        .eye-toggle img{width:18px;height:18px;}

        .update-btn {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--btn-bg), #0000c8);
            color: white;border: none;
            padding: 12px 28px;border-radius: 40px;
            cursor: pointer;margin-top: 20px;
            font-weight: 700;font-size: 0.95rem;
            letter-spacing: 0.06em;
            box-shadow: 0 4px 16px rgba(0,0,139,0.25);
            transition: transform 0.2s, opacity 0.2s;
            width: 100%;
        }
        .update-btn:hover{transform:translateY(-2px);opacity:0.9;}
        .update-btn:disabled, .update-btn.disabled {
            opacity: 0.35;pointer-events:none;transform:none;
        }
        body.dark .update-btn {
            background: linear-gradient(135deg,#FFA500,#ff8800);
            box-shadow: 0 4px 16px rgba(255,165,0,0.3);
        }

        .change-pw-btn {
            font-family: 'Outfit', sans-serif;
            background: transparent;
            border: 1.5px solid var(--btn-bg);
            color: var(--btn-bg);
            padding: 9px 22px;border-radius: 40px;
            cursor: pointer;font-weight: 700;font-size: 0.88rem;
            letter-spacing: 0.04em;
            transition: background 0.2s, transform 0.2s;
        }
        .change-pw-btn:hover{background:rgba(0,0,139,0.07);transform:translateY(-1px);}
        body.dark .change-pw-btn{border-color:var(--gold);color:var(--gold);}
        body.dark .change-pw-btn:hover{background:rgba(255,165,0,0.08);}

        .delete-account {
            display: inline-flex;align-items:center;gap:6px;
            color: #e05555;
            font-size: 0.85rem;font-weight:600;
            cursor: pointer;font-family:'Outfit',sans-serif;
            letter-spacing:0.03em;
            padding: 6px 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, opacity 0.2s;
            margin-top: 24px;
        }
        .delete-account:hover{border-bottom-color:#e05555;opacity:0.8;}

        .custom-modal {
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(6px);
            display:flex;align-items:center;justify-content:center;z-index:10000;
        }
        .modal-content {
            background:var(--card-bg);border-radius:24px;
            padding:28px 24px;width:90%;max-width:360px;
            text-align:center;color:var(--text-primary);
            box-shadow:0 24px 60px rgba(0,0,0,0.35);
            border:1px solid var(--border-light);
            animation:fadeInScale 0.25s cubic-bezier(0.34,1.2,0.64,1);
        }
        .modal-content h4{
            font-family:'Cinzel',serif;font-size:1.1rem;
            font-weight:700;letter-spacing:0.08em;margin-bottom:16px;
        }
        .modal-content input {
            width:100%;padding:11px 16px;margin:7px 0;
            border:1px solid var(--border-light);border-radius:30px;
            background:var(--option-bg);color:var(--text-primary);
            font-family:'Outfit',sans-serif;font-size:0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }
        .modal-content input:focus{border-color:var(--gold);}
        .modal-buttons{display:flex;gap:10px;justify-content:center;margin-top:18px;}
        .modal-buttons button {
            padding:10px 24px;border-radius:30px;border:none;
            cursor:pointer;font-weight:700;
            font-family:'Outfit',sans-serif;font-size:0.9rem;
            transition:transform 0.1s;
        }
        .modal-buttons button:active{transform:scale(0.97);}
        .modal-confirm{background:var(--btn-bg);color:white;}
        body.dark .modal-confirm{background:var(--gold);color:#0d0b07;}
        .modal-cancel{background:var(--option-bg);color:var(--text-primary);border:1px solid var(--border-light);}

        @keyframes fadeInScale{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

        .account-dropdown {
            position:absolute;top:calc(100% + 8px);left:0;
            background:var(--card-bg);
            border-radius:20px;
            box-shadow:0 8px 40px rgba(0,0,0,0.2);
            min-width:240px;z-index:100;
            padding:10px 0;
            border:1px solid var(--border-light);
            animation:fadeInScale 0.2s cubic-bezier(0.34,1.2,0.64,1);
        }
        .account-item {
            display:flex;align-items:center;gap:12px;
            padding:10px 18px;cursor:pointer;
            transition:background 0.2s;
        }
        .account-item:hover{background:var(--option-bg);}
        .account-item-img {
            width:36px;height:36px;border-radius:50%;
            object-fit:cover;border:2px solid var(--border-light);
        }
        .account-item-name{font-size:0.9rem;font-weight:500;}
        .add-account-btn {
            font-family:'Outfit',sans-serif;
            background:transparent;color:var(--btn-bg);
            border:1.5px solid var(--btn-bg);
            width:calc(100% - 32px);margin:8px 16px;padding:9px;
            border-radius:40px;cursor:pointer;font-weight:700;font-size:0.88rem;
            transition:background 0.2s, transform 0.2s;
        }
        .add-account-btn:hover{background:rgba(0,0,139,0.05);transform:translateY(-1px);}
        body.dark .add-account-btn{border-color:var(--gold);color:var(--gold);}
        body.dark .add-account-btn:hover{background:rgba(255,165,0,0.08);}

        .account-list-modal .account-item{
            border-radius:14px;margin:4px 8px;
            padding:10px 12px;
        }
        .account-list-modal .account-item-img{width:42px;height:42px;}

        .crop-modal {
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.88);
            display:flex;align-items:center;justify-content:center;
            z-index:20000;touch-action:none;
            backdrop-filter:blur(8px);
        }
        .crop-container {
            background:var(--card-bg);border-radius:24px;
            padding:24px 20px;width:95%;max-width:480px;
            text-align:center;border:1px solid var(--border-light);
            box-shadow:0 24px 80px rgba(0,0,0,0.5);
        }
        .crop-container h3{
            font-family:'Cinzel',serif;font-size:1.1rem;
            letter-spacing:0.08em;margin-bottom:16px;
        }
        .crop-canvas-wrapper {
            position:relative;width:100%;aspect-ratio:1/1;
            background:#111;border-radius:50%;overflow:hidden;
            margin-bottom:18px;touch-action:none;
        }
        canvas#cropCanvas{width:100%;height:100%;display:block;touch-action:none}
        .crop-controls{display:flex;justify-content:space-between;gap:14px;}
        .crop-controls button {
            flex:1;padding:11px;border-radius:40px;
            font-weight:700;font-size:0.95rem;
            font-family:'Outfit',sans-serif;border:none;cursor:pointer;
            transition:transform 0.15s;
        }
        .crop-controls button:hover{transform:translateY(-1px);}

        .password-section{margin-top:4px;}
        .password-section .account-field{margin-bottom:10px;}

        .bottom-action-row{
            display:flex;align-items:center;justify-content:space-between;
            flex-wrap:wrap;gap:12px;
            margin-top:8px;
        }

        .sidebar a img,.openbtn img {
            filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;
        }
        body.dark .sidebar a img,body.dark .openbtn img {
            filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;
        }
        .eye-toggle img,.icon-btn img {
            filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;
        }
        body.dark .eye-toggle img,body.dark .icon-btn img {
            filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;
        }
        .edit-pic-btn img{filter:brightness(0) invert(1) !important;}

        @keyframes fadeSlideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

        @media(max-width:768px){
            .openbtn{padding:6px 8px}
            .top-bar{min-height:60px;padding:8px 0}
            img#logoImg{height:32px}
            .logo-area h1{font-size:1.3rem}
            .logo-area p{font-size:0.65rem}
            .account-field label{min-width:58px;font-size:0.6rem;}
            .profile-pic{width:90px;height:90px;}
        }
    </style>
</head>
<body>
<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div id="sidebarLinks"></div>
    <a href="#" id="darkModeToggle" style="display:flex;align-items:center;">
        <img id="darkModeIcon" src="Moon.png" style="width:24px;height:24px;margin-right:12px;">
        <span id="darkModeText">Dark Mode</span>
    </a>
    <a href="#" class="logout" onclick="confirmLogout()" style="display:flex;align-items:center;">
        <img src="Logout.png" style="width:24px;height:24px;margin-right:12px;">
        Logout
    </a>
</div>
<div id="main" class="main">
    <div class="top-bar">
        <button class="openbtn" onclick="openNav()">
            <img src="Menu.png" alt="Menu">
        </button>
        <img id="logoImg" src="Bete_Fetena_Logo.png" alt="Logo" style="height:40px;margin-right:2px;vertical-align:middle;">
        <div class="logo-area">
            <h1><span class="bete">Bete</span><span class="fetena"> Fetena</span></h1>
            <p>Examine Yourself, Show Who You Are.</p>
        </div>
    </div>
    <div id="dynamicContent" class="content-area"></div>
</div>
<script src="shared.js"></script>
<script>
    if (!checkAuth()) { /* redirected */ }
    sessionStorage.setItem('currentPage', 'account.html');
    initDarkMode();
    buildSidebar('account');
    
    function updateDarkModeToggleIcon() {
        const icon = document.getElementById('darkModeIcon');
        const text = document.getElementById('darkModeText');
        if (document.body.classList.contains('dark')) {
            icon.src = 'Sun.png';
            text.textContent = 'Light Mode';
        } else {
            icon.src = 'Moon.png';
            text.textContent = 'Dark Mode';
        }
    }
    
    const originalToggle = toggleDarkMode;
    toggleDarkMode = function() {
        originalToggle();
        updateDarkModeToggleIcon();
    };
    
    document.getElementById('darkModeToggle').addEventListener('click', function(e) { e.preventDefault(); toggleDarkMode(); });
    updateDarkModeToggleIcon();

    let dropdownVisible = false;
    function toggleAccountDropdown() {
        const existing = document.querySelector('.account-dropdown');
        if (existing) {
            existing.remove();
            dropdownVisible = false;
            document.querySelector('.chevron-btn')?.classList.remove('rotated');
            return;
        }
        const phone = getUserPhone();
        if (!phone) return;
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        const phoneData = users[phone];
        if (!phoneData || !phoneData.accounts) return;
        const accounts = phoneData.accounts;
        const currentAccountId = getCurrentAccountId();
        const header = document.querySelector('.account-header');
        if (!header) return;
        const div = document.createElement('div');
        div.className = 'account-dropdown';
        accounts.forEach(acc => {
            const item = document.createElement('div');
            item.className = 'account-item';
            const img = document.createElement('img');
            img.className = 'account-item-img';
            img.src = acc.profilePic || 'default-avatar.png';

        const phone = getUserPhone();

        const phoneData = users[phone];
        if (!phoneData) return;
        const account = phoneData.accounts.find(acc => acc.accountId === accountId);
        if (!account) return;
        const accountName = (account.name || '') + (account.father ? ' ' + account.father : '');
        const warnModal = document.createElement('div');
        warnModal.className = 'custom-modal';
        warnModal.innerHTML = `

                <h4 style="color:#e05555;">⚠️ Permanent Deletion</h4>

            phoneData.accounts.splice(accountIndex, 1);

                showMessageModal("All accounts deleted. You have been logged out.", () => { window.location.href = 'login.html'; });

    let cropModal = null;
    let img = null;
    let canvas = null;
    let ctx = null;
    let scale = 1, offsetX = 0, offsetY = 0;
    let initialScale = 1, initialOffsetX = 0, initialOffsetY = 0;
    let initialPinchDistance = 0;
    let initialPinchCenter = { x: 0, y: 0 };
    let isPinching = false;
    let isPanning = false;
    let lastPanX = 0, lastPanY = 0;
    
    function openCropModal(imageDataUrl) {
        cropModal = document.createElement('div');
        cropModal.className = 'crop-modal';
        cropModal.innerHTML = `
            <div class="crop-container">
                <h3>Crop Profile Picture</h3>
                <div class="crop-canvas-wrapper">
                    <canvas id="cropCanvas" width="400" height="400"></canvas>
                </div>
                <div class="crop-controls">
                    <button id="cropCancelBtn" class="modal-cancel">Cancel</button>
                    <button id="cropConfirmBtn" class="modal-confirm">Confirm</button>
                </div>
            </div>
        `;
        document.body.appendChild(cropModal);
        canvas = document.getElementById('cropCanvas');
        ctx = canvas.getContext('2d');
        const wrapper = document.querySelector('.crop-canvas-wrapper');
        const rect = wrapper.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        img = new Image();
        img.onload = () => {
            const scaleX = canvas.width / img.width;
            const scaleY = canvas.height / img.height;
            scale = Math.max(scaleX, scaleY);
            offsetX = (canvas.width - img.width * scale) / 2;
            offsetY = (canvas.height - img.height * scale) / 2;
            drawPreview();
            attachEvents();
        };
        img.src = imageDataUrl;
        document.getElementById('cropCancelBtn').onclick = () => { cropModal.remove(); cropModal = null; };
        document.getElementById('cropConfirmBtn').onclick = () => {
            if (!img) return;
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = canvas.width;
            finalCanvas.height = canvas.height;
            const finalCtx = finalCanvas.getContext('2d');
            finalCtx.drawImage(img, offsetX, offsetY, img.width * scale, img.height * scale);
            finalCtx.globalCompositeOperation = 'destination-in';
            finalCtx.beginPath();
            finalCtx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, 2 * Math.PI);
            finalCtx.fill();
            const outputCanvas = document.createElement('canvas');
            outputCanvas.width = canvas.width;
            outputCanvas.height = canvas.height;
            const outCtx = outputCanvas.getContext('2d');
            outCtx.fillStyle = '#ffffff';
            outCtx.fillRect(0, 0, canvas.width, canvas.height);
            outCtx.drawImage(finalCanvas, 0, 0);
            const finalImage = outputCanvas.toDataURL('image/jpeg', 0.9);
            const data = getCurrentUserData();
            if (data) {
                data.account.profilePic = finalImage;
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                users[data.phone] = data.phoneData;
                localStorage.setItem('users', JSON.stringify(users));
                refreshNavbarProfile();
                renderAccount();
            }
            cropModal.remove();
            cropModal = null;
        };
        
        function drawPreview() {
            if (!ctx || !img) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.drawImage(img, offsetX, offsetY, img.width * scale, img.height * scale);
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, 2 * Math.PI);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);
            ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, 2 * Math.PI);
            ctx.clip('evenodd');
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255,165,0,0.8)';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }
        
        function attachEvents() {
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchend', onTouchEnd);
            canvas.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        }
        function getTouchDistance(touches) { const dx = touches[0].clientX - touches[1].clientX; const dy = touches[0].clientY - touches[1].clientY; return Math.hypot(dx, dy); }
        function getTouchCenter(touches) { return { x: (touches[0].clientX + touches[1].clientX) / 2, y: (touches[0].clientY + touches[1].clientY) / 2 }; }
        function onTouchStart(e) {
            e.preventDefault();
            const touches = Array.from(e.touches);
            if (touches.length === 1) { isPanning = true; lastPanX = touches[0].clientX; lastPanY = touches[0].clientY; }
            else if (touches.length === 2) {
                isPinching = true; isPanning = false;
                initialPinchDistance = getTouchDistance(touches);
                initialScale = scale;
                const center = getTouchCenter(touches);
                const rect = canvas.getBoundingClientRect();
                const canvasX = (center.x - rect.left) * (canvas.width / rect.width);
                const canvasY = (center.y - rect.top) * (canvas.height / rect.height);
                initialPinchCenter = { x: canvasX, y: canvasY };
                initialOffsetX = offsetX; initialOffsetY = offsetY;
            }
        }
        function onTouchMove(e) {
            e.preventDefault();
            const touches = Array.from(e.touches);
            if (touches.length === 1 && isPanning) {
                const dx = (touches[0].clientX - lastPanX);
                const dy = (touches[0].clientY - lastPanY);
                const rect = canvas.getBoundingClientRect();
                const scaleFactor = canvas.width / rect.width;
                offsetX += dx * scaleFactor; offsetY += dy * scaleFactor;
                const minX = canvas.width - img.width * scale; const maxX = 0;
                offsetX = Math.min(maxX, Math.max(minX, offsetX));
                const minY = canvas.height - img.height * scale; const maxY = 0;
                offsetY = Math.min(maxY, Math.max(minY, offsetY));
                lastPanX = touches[0].clientX; lastPanY = touches[0].clientY;
                drawPreview();
            } else if (touches.length === 2 && isPinching) {
                const newDistance = getTouchDistance(touches);
                const scaleChange = newDistance / initialPinchDistance;
                let newScale = initialScale * scaleChange;
                newScale = Math.min(Math.max(newScale, 0.5), 5);
                if (newScale !== scale) {
                    const canvasX = initialPinchCenter.x;
                    const canvasY = initialPinchCenter.y;
                    const oldScale = scale;
                    scale = newScale;
                    const factor = scale / oldScale;
                    const newOffsetX = canvasX - (canvasX - initialOffsetX) * factor;
                    const newOffsetY = canvasY - (canvasY - initialOffsetY) * factor;
                    offsetX = newOffsetX; offsetY = newOffsetY;
                    const minX = canvas.width - img.width * scale; const maxX = 0;
                    offsetX = Math.min(maxX, Math.max(minX, offsetX));
                    const minY = canvas.height - img.height * scale; const maxY = 0;
                    offsetY = Math.min(maxY, Math.max(minY, offsetY));
                    drawPreview();
                }
            }
        }
        function onTouchEnd(e) {
            if (e.touches.length === 0) { isPanning = false; isPinching = false; }
            else if (e.touches.length === 1) { isPinching = false; isPanning = true; lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY; }
        }
        let mouseDown = false;
        function onMouseDown(e) {
            e.preventDefault();
            mouseDown = true;
            const rect = canvas.getBoundingClientRect();
            const scaleFactor = canvas.width / rect.width;
            lastPanX = e.clientX; lastPanY = e.clientY;
            function onMouseMoveHandler(me) {
                if (!mouseDown) return;
                const dx = (me.clientX - lastPanX) * scaleFactor;
                const dy = (me.clientY - lastPanY) * scaleFactor;
                offsetX += dx; offsetY += dy;
                const minX = canvas.width - img.width * scale; const maxX = 0;
                offsetX = Math.min(maxX, Math.max(minX, offsetX));
                const minY = canvas.height - img.height * scale; const maxY = 0;
                offsetY = Math.min(maxY, Math.max(minY, offsetY));
                lastPanX = me.clientX; lastPanY = me.clientY;
                drawPreview();
            }
            function onMouseUpHandler() {
                mouseDown = false;
                window.removeEventListener('mousemove', onMouseMoveHandler);
                window.removeEventListener('mouseup', onMouseUpHandler);
            }
            window.addEventListener('mousemove', onMouseMoveHandler);
            window.addEventListener('mouseup', onMouseUpHandler);
        }
    }

        const nameInput = document.getElementById('editName');
        const fatherInput = document.getElementById('editFather');
        const grandInput = document.getElementById('editGrand');
        const origPhone = data.phone, origName = user.name || '', origFather = user.father || '', origGrand = user.grand || '';
        function checkChanges() {
            const changed = (phoneInput.value.trim() !== origPhone) || (nameInput.value.trim() !== origName) || (fatherInput.value.trim() !== origFather) || (grandInput.value.trim() !== origGrand);
            btn.disabled = !changed;
            btn.classList.toggle('disabled', !changed);
        }
        phoneInput.addEventListener('input', checkChanges);
        nameInput.addEventListener('input', checkChanges);
        fatherInput.addEventListener('input', checkChanges);
        grandInput.addEventListener('input', checkChanges);
        btn.onclick = () => {
            const newPhoneRaw = phoneInput.value.trim();
            function normalizePhone(p) {
                let ph = p.trim();
                if (/^09[0-9]{8}$/.test(ph)) return '+251' + ph.substring(1);
                if (/^07[0-9]{8}$/.test(ph)) return '+251' + ph.substring(1);
                if (/^\+251[79][0-9]{8}$/.test(ph)) return ph;
                if (/^251[79][0-9]{8}$/.test(ph)) return '+' + ph;
                return null;
            }
            const newPhone = normalizePhone(newPhoneRaw);
            if (!newPhone) { showMessageModal("Invalid phone number."); return; }
            const newName = nameInput.value.trim();
            const newFather = fatherInput.value.trim();
            const newGrand = grandInput.value.trim();
            if (!newName || !newFather) { showMessageModal("Name and Father's Name are required."); return; }

                let users = JSON.parse(localStorage.getItem('users') || '{}');
                let phoneData = users[data.phone];
                if (!phoneData) { showMessageModal("User not found"); return; }
                const accountIndex = phoneData.accounts.findIndex(acc => acc.accountId === data.account.accountId);
                if (accountIndex === -1) { showMessageModal("Account not found"); return; }
                if (phoneData.accounts[accountIndex].password !== password) { showMessageModal("Incorrect password."); return; }
                if (newPhone !== data.phone) {
                    if (users[newPhone]) { showMessageModal("Phone already registered."); return; }
                    users[newPhone] = phoneData;
                    delete users[data.phone];
                    sessionStorage.setItem('userPhone', newPhone);
                    users[newPhone].accounts[accountIndex].name = newName;
                    users[newPhone].accounts[accountIndex].father = newFather;
                    users[newPhone].accounts[accountIndex].grand = newGrand;
                    localStorage.setItem('users', JSON.stringify(users));
                    showMessageModal("Account updated. Please log in again.", () => logout());
                } else {
                    users[data.phone].accounts[accountIndex].name = newName;
                    users[data.phone].accounts[accountIndex].father = newFather;
                    users[data.phone].accounts[accountIndex].grand = newGrand;
                    localStorage.setItem('users', JSON.stringify(users));
                    showMessageModal("Account updated.", () => renderAccount());
                }
            });
        };
    };

    window.renderPasswordChangeMode = function() {
        const data = getCurrentUserData();
        if (!data) { logout(); return; }
        const html = `
            <div class="account-container">
                <div class="account-header">
                    <span class="back-chevron" onclick="renderAccount()">‹</span>
                    <h3>Change Password</h3>
                    <span style="width:36px;"></span>
                </div>
                <span class="section-label">Update Password</span>
                <div class="password-section">
                    <div class="account-field editable"><label>Old</label><input type="password" id="oldPw" placeholder="Current password" maxlength="6"></div>
                    <div class="account-field editable"><label>New</label><input type="password" id="newPw" placeholder="New 6-digit password" maxlength="6"></div>
                    <div class="account-field editable"><label>Confirm</label><input type="password" id="confirmPw" placeholder="Confirm new password" maxlength="6"></div>
                </div>
                <button class="update-btn" id="updatePwBtn">Update Password</button>
            </div>
        `;
        document.getElementById("dynamicContent").innerHTML = html;
        document.getElementById('updatePwBtn').onclick = () => {
            const oldPw = document.getElementById('oldPw').value.trim();
            const newPw = document.getElementById('newPw').value.trim();
            const confirmPw = document.getElementById('confirmPw').value.trim();
            if (!oldPw || !newPw || !confirmPw) { showMessageModal("Fill all fields."); return; }
            if (!/^\d{6}$/.test(newPw)) { showMessageModal("Password must be 6 digits."); return; }
            if (newPw !== confirmPw) { showMessageModal("Passwords don't match."); return; }
            let users = JSON.parse(localStorage.getItem('users') || '{}');
            let phoneData = users[data.phone];
            if (!phoneData) { showMessageModal("User not found"); return; }
            const accountIndex = phoneData.accounts.findIndex(acc => acc.accountId === data.account.accountId);
            if (accountIndex === -1) { showMessageModal("Account not found"); return; }
            if (phoneData.accounts[accountIndex].password !== oldPw) { showMessageModal("Old password incorrect."); return; }
            if (oldPw === newPw) { showMessageModal("New password cannot be same as old."); return; }
            phoneData.accounts[accountIndex].password = newPw;
            users[data.phone] = phoneData;
            localStorage.setItem('users', JSON.stringify(users));
            showMessageModal("Password changed. Log in again.", () => logout());
        };
    };

    renderAccount();
</script>
</body>
</html>
