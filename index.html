<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bete Fetena - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --bg: #f4f1eb;
            --card: #ffffff;
            --text: #0a0a0a;
            --text-secondary: #5a5a5a;
            --navy: #00008B;
            --gold: #FFA500;
            --border: rgba(0,0,0,0.1);
            --input-bg: #f0ece3;
            --error-bg: #fff0f0;
            --error-text: #c62828;
            --grain-opacity: 0.03;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9998;
        }

        .form-wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 28px;
            padding: 36px 28px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .form-wrapper::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--navy), var(--gold));
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .logo-row img { height: 42px; width: auto; }
        .logo-row h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            font-weight: 400;
            color: var(--navy);
            letter-spacing: -0.01em;
            margin: 0;
        }

        .slogan {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-style: italic;
            margin-bottom: 28px;
            font-weight: 400;
        }

        h2 {
            font-family: 'DM Serif Display', serif;
            text-align: center;
            margin-bottom: 22px;
            color: var(--text);
            font-size: 1.35rem;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .input-group { margin-bottom: 12px; position: relative; }
        .two-cols { display: flex; gap: 10px; }
        .two-cols .input-group { flex: 1; }

        input {
            width: 100%;
            padding: 11px 42px 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 30px;
            font-size: 0.92rem;
            font-family: 'DM Sans', sans-serif;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--navy);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,0,139,0.07);
        }
        input::placeholder { color: rgba(0,0,0,0.35); }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 30px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(0,0,139,0.25);
            margin-top: 4px;
        }
        button.submit-btn:hover { transform: translateY(-2px); opacity: 0.92; box-shadow: 0 8px 24px rgba(0,0,139,0.32); }
        button.submit-btn:active { transform: scale(0.98); }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 9px 14px;
            border-radius: 30px;
            margin-bottom: 14px;
            font-size: 0.84rem;
            text-align: center;
            border: 1px solid rgba(198,40,40,0.15);
        }

        .switch-text {
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .switch-text span {
            color: var(--navy);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .switch-text span:hover { opacity: 0.75; }

        .hidden { display: none; }

        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 13px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.5; transition: opacity 0.2s;
        }
        .toggle-password:hover { opacity: 0.8; }
        .toggle-password img { width: 18px; height: 18px; filter: brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg); }

        .custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
        }
        .modal-content {
            background: white;
            border-radius: 22px;
            padding: 26px 22px;
            width: 90%; max-width: 340px;
            text-align: center;
            box-shadow: 0 22px 60px rgba(0,0,0,0.28);
            border: 1px solid rgba(0,0,0,0.08);
        }
        .modal-content h4 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem; font-weight: 400;
            letter-spacing: -0.01em;
            margin-bottom: 16px;
            color: var(--text);
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 14px; }
        .modal-buttons button { padding: 9px 22px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; }
        .modal-cancel { background: #f0ece3; color: var(--text); }

        .account-list { list-style: none; margin: 12px 0; padding: 0; text-align: left; }
        .account-list li {
            padding: 11px 16px;
            margin: 6px 0;
            background: #f4f1eb;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            text-align: center;
            font-size: 0.92rem;
            transition: background 0.15s, color 0.15s, transform 0.15s;
            border: 1.5px solid transparent;
        }
        .account-list li:hover { background: var(--navy); color: white; transform: translateY(-1px); }

        .form-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="form-wrapper">
    <div class="logo-row">
        <img src="Bete_Fetena_Logo.png" alt="Logo">
        <h1>Bete Fetena</h1>
    </div>
    <div class="slogan">Examine Yourself, Show Who You Are.</div>

    <div id="errorBox" class="error hidden"></div>

    <div id="loginForm">
        <h2>Welcome Back</h2>
        <div class="input-group">
            <input type="tel" id="loginPhone" placeholder="Phone number" maxlength="20" autocomplete="tel">
        </div>
        <div class="input-group password-wrapper">
            <input type="password" id="loginPassword" placeholder="6-digit password" maxlength="6" inputmode="numeric" autocomplete="current-password">
            <span class="toggle-password" id="toggleLoginPassword"><img src="Eye.png" alt="Show"></span>
        </div>
        <button class="submit-btn" id="loginBtn">Login</button>
        <div class="switch-text">Don't have an account? <span id="showRegister">Register</span></div>
    </div>

    <div id="registerForm" class="hidden">
        <h2>Create Account</h2>
        <div class="input-group">
            <input type="tel" id="regPhone" placeholder="Phone number" maxlength="20" autocomplete="tel">
        </div>
        <div class="two-cols">
            <div class="input-group"><input type="text" id="regName" placeholder="Name" maxlength="21" autocomplete="given-name"></div>
            <div class="input-group"><input type="text" id="regFatherName" placeholder="Father's Name" maxlength="21"></div>
        </div>
        <div class="input-group">
            <input type="text" id="regGrandFatherName" placeholder="Grandfather's Name (optional)" maxlength="21">
        </div>
        <div class="input-group password-wrapper">
            <input type="password" id="regPassword" placeholder="6-digit password" maxlength="6" inputmode="numeric" autocomplete="new-password">
            <span class="toggle-password" id="toggleRegisterPassword"><img src="Eye.png" alt="Show"></span>
        </div>
        <div class="input-group">
            <input type="password" id="regConfirmPassword" placeholder="Confirm password" maxlength="6" inputmode="numeric" autocomplete="new-password">
        </div>
        <button class="submit-btn" id="registerBtn">Create Account</button>
        <div class="switch-text">Already have an account? <span id="showLogin">Login</span></div>
    </div>
</div>

<script>
    function normalizePhone(phone) {
        let p = phone.trim();
        if (/^09[0-9]{8}$/.test(p)) return '+251' + p.substring(1);
        if (/^07[0-9]{8}$/.test(p)) return '+251' + p.substring(1);
        if (/^\+251[79][0-9]{8}$/.test(p)) return p;
        if (/^251[79][0-9]{8}$/.test(p)) return '+' + p;
        return null;
    }
    function isValidPassword(p) { return /^\d{6}$/.test(p); }

    function showError(msg) {
        const e = document.getElementById('errorBox');
        e.textContent = msg;
        e.classList.remove('hidden');
        setTimeout(() => e.classList.add('hidden'), 3500);
    }

    const loginPassword = document.getElementById('loginPassword');
    const toggleLogin = document.getElementById('toggleLoginPassword');
    toggleLogin.addEventListener('click', () => {
        const type = loginPassword.type === 'password' ? 'text' : 'password';
        loginPassword.type = type;
        toggleLogin.querySelector('img').src = type === 'password' ? 'Eye.png' : 'Slashed_Eye.png';
    });

    const regPassword = document.getElementById('regPassword');
    const toggleReg = document.getElementById('toggleRegisterPassword');
    toggleReg.addEventListener('click', () => {
        const type = regPassword.type === 'password' ? 'text' : 'password';
        regPassword.type = type;
        toggleReg.querySelector('img').src = type === 'password' ? 'Eye.png' : 'Slashed_Eye.png';
    });

    document.getElementById('showRegister').onclick = () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('errorBox').classList.add('hidden');
        document.getElementById('loginPhone').value = '';
        document.getElementById('loginPassword').value = '';
        history.replaceState({ page: 'register' }, '', '#register');
    };
    document.getElementById('showLogin').onclick = () => {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('errorBox').classList.add('hidden');
        ['regPhone','regName','regFatherName','regGrandFatherName','regPassword','regConfirmPassword'].forEach(id => { document.getElementById(id).value = ''; });
        history.replaceState({ page: 'login' }, '', '#login');
    };

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (!document.getElementById('loginForm').classList.contains('hidden')) document.getElementById('loginBtn').click();
            else document.getElementById('registerBtn').click();
        }
    });

    document.getElementById('loginBtn').onclick = () => {
        const rawPhone = document.getElementById('loginPhone').value.trim();
        const phone = normalizePhone(rawPhone);
        const pw = document.getElementById('loginPassword').value.trim();
        if (!phone) { showError('Invalid phone number'); return; }
        if (!isValidPassword(pw)) { showError('Password must be 6 digits'); return; }

        let users = JSON.parse(localStorage.getItem('users') || '{}');
        let phoneData = users[phone];
        if (!phoneData) { showError('Phone number not registered'); return; }

        if (!phoneData.accounts) {
            if (phoneData.password !== pw) { showError('Invalid password'); return; }
            const newAccountId = 'default-' + Date.now();
            const newAccount = { accountId:newAccountId, name:phoneData.name||'', father:phoneData.father||'', grand:phoneData.grand||'', password:phoneData.password, plan:phoneData.plan||'free', profilePic:phoneData.profilePic||null, examHistory:phoneData.examHistory||[], dashboardRange:phoneData.dashboardRange||'last7days', dashboardCategory:phoneData.dashboardCategory||'national' };
            phoneData.accounts = [newAccount];
            ['name','father','grand','password','plan','profilePic','examHistory','dashboardRange','dashboardCategory'].forEach(k => delete phoneData[k]);
            users[phone] = phoneData; localStorage.setItem('users', JSON.stringify(users));
            sessionStorage.setItem('userPhone', phone); sessionStorage.setItem('currentAccountId', newAccountId); sessionStorage.setItem('currentPage', 'home.html');
            window.location.href = 'home.html'; return;
        }

        const matchingAccounts = phoneData.accounts.filter(acc => acc.password === pw);
        if (matchingAccounts.length === 0) { showError('Invalid password'); return; }

        if (matchingAccounts.length === 1) {
            sessionStorage.setItem('userPhone', phone); sessionStorage.setItem('currentAccountId', matchingAccounts[0].accountId); sessionStorage.setItem('currentPage', 'home.html');
            window.location.href = 'home.html';
        } else {
            const modal = document.createElement('div'); modal.className = 'custom-modal';
            let listHtml = '<h4>Select Account</h4><ul class="account-list">';
            matchingAccounts.forEach(acc => { const dn = (acc.name||'') + (acc.father ? ' '+acc.father.charAt(0)+'.' : ''); listHtml += `<li data-id="${acc.accountId}">${dn||'Unnamed'}</li>`; });
            listHtml += '</ul><div class="modal-buttons"><button class="modal-cancel">Cancel</button></div>';
            modal.innerHTML = `<div class="modal-content">${listHtml}</div>`;
            document.body.appendChild(modal);
            modal.querySelectorAll('.account-list li').forEach(li => { li.onclick = () => { sessionStorage.setItem('userPhone', phone); sessionStorage.setItem('currentAccountId', li.getAttribute('data-id')); sessionStorage.setItem('currentPage', 'home.html'); window.location.href = 'home.html'; }; });
            modal.querySelector('.modal-cancel').onclick = () => modal.remove();
        }
    };

    document.getElementById('registerBtn').onclick = () => {
        const rawPhone = document.getElementById('regPhone').value.trim();
        const phone = normalizePhone(rawPhone);
        const name = document.getElementById('regName').value.trim();
        const father = document.getElementById('regFatherName').value.trim();
        const grand = document.getElementById('regGrandFatherName').value.trim();
        const pw = document.getElementById('regPassword').value.trim();
        const cpw = document.getElementById('regConfirmPassword').value.trim();

        if (!rawPhone) { showError('Phone is required'); return; }
        if (!name) { showError('Name is required'); return; }
        if (!father) { showError("Father's name is required"); return; }
        if (!pw) { showError('Password is required'); return; }
        if (!cpw) { showError('Confirm password is required'); return; }
        if (!phone) { showError('Invalid phone number'); return; }
        if (!isValidPassword(pw)) { showError('Password must be 6 digits'); return; }
        if (pw !== cpw) { showError('Passwords do not match'); return; }

        let users = JSON.parse(localStorage.getItem('users') || '{}');
        let phoneData = users[phone];
        if (!phoneData) phoneData = { accounts: [] };
        if (phoneData.accounts.length >= 3) { showError('Maximum 3 accounts per phone number'); return; }

        const newAccountId = Date.now() + '-' + Math.random().toString(36);
        phoneData.accounts.push({ accountId:newAccountId, name, father, grand, password:pw, plan:'free', profilePic:null, examHistory:[], dashboardRange:'last7days', dashboardCategory:'national' });
        users[phone] = phoneData; localStorage.setItem('users', JSON.stringify(users));
        sessionStorage.setItem('userPhone', phone); sessionStorage.setItem('currentAccountId', newAccountId); sessionStorage.setItem('currentPage', 'home.html');
        window.location.href = 'home.html';
    };

    history.replaceState({ page: 'login' }, '', '#login');
</script>
</body>
</html>
