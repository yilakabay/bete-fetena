<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bete Fetena - Exams</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --bg-body: #f4f1eb;
            --bg-sidebar: #fdfaf5;
            --sidebar-text: #0a0a0a;
            --text-primary: #0a0a0a;
            --text-secondary: #5a5a5a;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.07);
            --shadow-nav: 0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
            --btn-bg: #00008B;
            --gold: #FFA500;
            --navy: #00008B;
            --cat-bg: #f0ece3;
            --option-bg: #e8e3d8;
            --border-light: rgba(0,0,0,0.08);
            --grain-opacity: 0.03;
            --navbar-bg: rgba(255,255,255,0.96);
            --active-highlight: rgba(0,0,139,0.1);
            --score-color: #00008B;
            --wrong-color: #e05555;
            --overtime-color: #e05555;
        }
        body.dark {
            --bg-body: #0e0c08;
            --bg-sidebar: #141209;
            --sidebar-text: #f5e6c8;
            --text-primary: #f0e8d0;
            --text-secondary: #9a8f78;
            --card-bg: #1a1710;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-nav: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
            --btn-bg: #FFA500;
            --gold: #FFA500;
            --navy: #4d6fff;
            --cat-bg: #1e1b12;
            --option-bg: #222017;
            --border-light: rgba(255,255,255,0.07);
            --grain-opacity: 0.05;
            --navbar-bg: rgba(22,19,13,0.97);
            --active-highlight: rgba(255,165,0,0.12);
            --score-color: #FFA500;
            --wrong-color: #ff8888;
            --overtime-color: #ff8888;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body); color: var(--text-primary);
            transition: background 0.4s, color 0.4s; overflow-x: hidden;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: var(--grain-opacity); pointer-events: none; z-index: 9998;
        }

        .top-nav {
            position: fixed; top: 12px; left: 12px; right: 12px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px;
            background: var(--navbar-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-nav);
            border: 1px solid var(--border-light);
            backdrop-filter: blur(16px);
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
        .nav-right { min-width: 40px; }
        .menu-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 10px; }
        .menu-btn img { width: 22px; height: 22px; }
        .nav-logo-img { height: 30px; width: auto; }
        .nav-brand { font-family: 'DM Serif Display', serif; font-size: 1.25rem; font-weight: 400; color: var(--navy); }
        body.dark .nav-brand { color: var(--gold); }
        .page-content { padding-top: 76px; padding-left: 14px; padding-right: 14px; }

        .sidebar {
            height:100%;width:0;position:fixed;top:0;left:0;background:var(--bg-sidebar);overflow-x:hidden;transition:0.3s;padding-top:0;z-index:2000;box-shadow:4px 0 40px rgba(0,0,0,0.15);border-right:1px solid var(--border-light);
        }
        .sidebar-user-header { padding:40px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;overflow:hidden;min-height:160px; }
        .sidebar-user-header.plan-free { background:linear-gradient(160deg,#1B2F5E 0%,#00008B 100%); }
        .sidebar-user-header.plan-zgju { background:linear-gradient(160deg,#1a1f3c 0%,#0d1130 100%);border-bottom:2px solid rgba(255,165,0,0.4); }
        .sidebar-user-header.plan-qeleme { background:linear-gradient(160deg,#0c0a06 0%,#1a1400 100%);border-bottom:2px solid rgba(255,215,0,0.5); }
        .sidebar-avatar { width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.3); }
        .sidebar-username { font-size:0.95rem;font-weight:600;color:#ffffff;text-align:center; }
        .sidebar-plan-badge { font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 12px;border-radius:20px; }
        .badge-free{background:rgba(255,255,255,0.15);color:#d0e0ff;}
        .badge-zgju{background:rgba(255,165,0,0.2);color:#FFA500;border:1px solid rgba(255,165,0,0.35);}
        .badge-qeleme{background:rgba(255,215,0,0.15);color:#FFD700;border:1px solid rgba(255,215,0,0.4);}
        .sidebar .closebtn { position:absolute;top:14px;right:18px;font-size:24px;color:rgba(255,255,255,0.7);padding:4px 8px !important;cursor:pointer;background:rgba(255,255,255,0.1);border-radius:8px;border:none; }
        .sidebar-nav-links { padding:8px 0; }
        .sidebar a { padding:13px 24px;text-decoration:none;font-size:0.9rem;font-weight:500;color:var(--sidebar-text);display:flex;align-items:center; }
        .sidebar a:hover{background:rgba(0,0,139,0.05);padding-left:30px;}
        .sidebar .logout{color:#e05555;margin-top:8px;border-top:1px solid var(--border-light);}

        .sidebar a img{filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;}
        body.dark .sidebar a img{filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;}
        .menu-btn img{filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;}

        .exams-container {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 22px 18px;
            margin-top: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            position: relative;
        }
        .exams-container::before { content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--gold)); }
        .exams-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:22px; }
        .exams-header h3 { font-family:'DM Serif Display',serif;margin:0;font-size:1.35rem;font-weight:400; }
        .back-chevron { font-size:1.8rem;cursor:pointer;color:var(--text-primary);width:36px;opacity:0.5; }
        .back-chevron:hover{opacity:1;}
        .category-nav .section-label { font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;opacity:0.35;margin-bottom:12px;display:block; }
        .category-buttons{display:flex;flex-wrap:wrap;gap:9px;}
        .cat-btn {
            background: var(--cat-bg);
            border: 1px solid var(--border-light);
            padding: 9px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .cat-btn:hover { transform:translateY(-2px); border-color:var(--gold); }
        .back-cat-btn { background:transparent;border:1px solid var(--border-light);padding:7px 16px;border-radius:30px;cursor:pointer;margin-bottom:18px; }
        .back-cat-btn:hover{border-color:var(--gold);}

        .custom-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:10000;}
        .modal-content{background:var(--card-bg);border-radius:22px;padding:26px 22px;width:90%;max-width:340px;text-align:center;}
        .modal-buttons{display:flex;gap:10px;justify-content:center;margin-top:16px;}
        .modal-buttons button{padding:9px 22px;border-radius:30px;border:none;cursor:pointer;font-weight:600;}
        .modal-confirm{background:var(--btn-bg);color:white;}
        .modal-cancel{background:var(--option-bg);color:var(--text-primary);}

        @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
<div id="mySidebar" class="sidebar">
    <button class="closebtn" onclick="closeNav()">✕</button>
    <div id="sidebarUserHeader" class="sidebar-user-header plan-free">
        <img id="sidebarAvatar" class="sidebar-avatar" src="default-avatar.png" onerror="this.src='default-avatar.png'">
        <div class="sidebar-username" id="sidebarUsername">Student</div>
        <div class="sidebar-plan-badge badge-free" id="sidebarPlanBadge">Free</div>
    </div>
    <div class="sidebar-nav-links" id="sidebarLinks"></div>
    <a href="#" id="darkModeToggle" style="display:flex;align-items:center;">
        <img id="darkModeIcon" src="Moon.png" style="width:20px;height:20px;margin-right:12px;">
        <span id="darkModeText">Dark Mode</span>
    </a>
    <a href="#" class="logout" onclick="confirmLogout()" style="display:flex;align-items:center;">
        <img src="Logout.png" style="width:20px;height:20px;margin-right:12px;">
        Logout
    </a>
</div>
<div id="main" class="main">
    <nav class="top-nav">
        <div class="nav-left"><button class="menu-btn" onclick="openNav()"><img src="Menu.png"></button></div>
        <div class="nav-center"><img class="nav-logo-img" src="Bete_Fetena_Logo.png"><div class="nav-brand">Bete Fetena</div></div>
        <div class="nav-right"></div>
    </nav>
    <div class="page-content"><div id="dynamicContent" class="content-area"></div></div>
</div>
<script src="shared.js"></script>
<script>
    if (!checkAuth(false)) {
        showConfirmModal("You need to log in to access exams.", function() { window.location.href = 'index.html'; }, function() { window.location.href = 'home.html'; });
    }
    sessionStorage.setItem('currentPage', 'exams.html');
    initDarkMode();
    buildSidebar('exams');

    function populateSidebarHeader() {
        const data = getCurrentUserData();
        if (!data) return;
        const user = data.account, plan = user.plan || 'free';
        const name = user.name || 'Student', father = user.father ? ' ' + user.father.charAt(0) + '.' : '';
        const pic = user.profilePic || 'default-avatar.png';
        const header = document.getElementById('sidebarUserHeader');
        const avatar = document.getElementById('sidebarAvatar');
        const username = document.getElementById('sidebarUsername');
        const badge = document.getElementById('sidebarPlanBadge');
        if (avatar) { avatar.src = pic; avatar.onerror = () => { avatar.src = 'default-avatar.png'; }; }
        if (username) username.textContent = name + father;
        if (header) header.className = 'sidebar-user-header plan-' + plan;
        if (badge) {
            badge.className = 'sidebar-plan-badge badge-' + plan;
            badge.textContent = { free:'Free Plan', zgju:'Zgju Plan', qeleme:'✦ Qeleme Elite' }[plan] || 'Free Plan';
        }
    }
    populateSidebarHeader();

    function updateDarkModeToggleIcon() {
        const icon = document.getElementById('darkModeIcon'), text = document.getElementById('darkModeText');
        if (document.body.classList.contains('dark')) { icon.src = 'Sun.png'; text.textContent = 'Light Mode'; }
        else { icon.src = 'Moon.png'; text.textContent = 'Dark Mode'; }
    }
    const originalToggle = toggleDarkMode;
    toggleDarkMode = function() { originalToggle(); updateDarkModeToggleIcon(); };
    document.getElementById('darkModeToggle').addEventListener('click', e => { e.preventDefault(); toggleDarkMode(); });
    updateDarkModeToggleIcon();

    let currentLevel = 0, selectedMain = "", selectedFirst = "";
    const examsData = {
        mainCategories: ["National/Ministry/Exit Exams","School/Institution Standard Exams"],
        nationalSub: ["Exit","ESSLCE (Grade 12)","MLSCLE (Grade 8)"],
        schoolSub: ["Grade 12","Grade 11","Grade 10","Grade 9","Grade 8","Grade 7","Higher Education (BA, BSc, LLB...)"],
        esslceSubjects: ["Biology","Physics","Chemistry","Economics","Geography","History","Aptitude"].sort(),
        comingSoonSubjects: ["Mathematics (Natural Science)","Mathematics (Social Science)","English"].sort(),
        grade8MLSCLESubjects: ["Mathematics","English","Citizenship Education","Social Studies","General Science"].sort()
    };
    for (let grade of ["Grade12","Grade11","Grade10","Grade9","Grade8","Grade7"]) {
        examsData[`${grade}Subjects`] = [];
    }

    function renderCategoryLevel() {
        let html = `<div class="exams-container"><div class="exams-header"><span class="back-chevron" onclick="navigateTo('home.html')">‹</span><h3>Exams</h3><span></span></div><div class="category-nav">`;
        if (currentLevel === 0) {
            html += `<span class="section-label">Select Exam Category</span><div class="category-buttons">`;
            examsData.mainCategories.forEach(cat => { html += `<button class="cat-btn" onclick="window.selectMain('${cat.replace(/'/g,"\\'")}')">${cat}</button>`; });
            html += '</div>';
        } else if (currentLevel === 1) {
            html += `<button class="back-cat-btn" onclick="window.goBack()">‹ Back</button><span class="section-label">${selectedMain}</span><div class="category-buttons">`;
            const subs = selectedMain==="National/Ministry/Exit Exams" ? examsData.nationalSub : (selectedMain==="School/Institution Standard Exams" ? examsData.schoolSub : []);
            subs.forEach(sub => { html += `<button class="cat-btn" onclick="window.selectFirst('${sub.replace(/'/g,"\\'")}')">${sub}</button>`; });
            html += '</div>';
        } else if (currentLevel === 2) {
            html += `<button class="back-cat-btn" onclick="window.goBack()">‹ Back</button><span class="section-label">${selectedFirst}</span><div class="category-buttons">`;
            if (selectedFirst === "ESSLCE (Grade 12)") {
                examsData.esslceSubjects.forEach(sub => { html += `<button class="cat-btn" onclick="showComingSoonModal()">${sub}</button>`; });
                examsData.comingSoonSubjects.forEach(sub => { html += `<button class="cat-btn coming-soon" disabled>${sub}</button>`; });
            } else {
                html += '<p style="opacity:0.45;padding:8px 0;">Coming Soon</p>';
            }
            html += '</div>';
        }
        html += '</div></div>';
        document.getElementById("dynamicContent").innerHTML = html;
    }

    window.selectMain = function(cat) { selectedMain=cat; currentLevel=1; renderCategoryLevel(); };
    window.selectFirst = function(first) { selectedFirst=first; currentLevel=2; renderCategoryLevel(); };
    window.goBack = function() { if(currentLevel>0) currentLevel--; renderCategoryLevel(); };

    function showComingSoonModal() {
        const modal = document.createElement('div'); modal.className = 'custom-modal';
        modal.innerHTML = `<div class="modal-content"><h4>✨ Coming Soon</h4><p>This subject will be available soon.</p><div class="modal-buttons"><button class="modal-confirm" id="soonOk">OK</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#soonOk').onclick = () => modal.remove();
    }

    renderCategoryLevel();
</script>
</body>
</html>
