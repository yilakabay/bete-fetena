<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bete Fetena - Account</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root {
            --bg-body: #f4f1eb;
            --bg-sidebar: #fdaf5;
            --sidebar-text: #0a0a0a;
            --text-primary: #0a0a0a;
            --text-secondary: #5a5a5a;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.07);
            --shadow-nav: 0 8px 40px rgba(0,0,0,0.18);
            --btn-bg: #00008B;
            --gold: #FFA500;
            --navy: #00008B;
            --cat-bg: #f0ece3;
            --option-bg: #e8e3d8;
            --border-light: rgba(0,0,0,0.08);
            --grain-opacity: 0.03;
            --navbar-bg: rgba(255,255,255,0.96);
        }
        body.dark {
            --bg-body: #0e0c08;
            --bg-sidebar: #141209;
            --sidebar-text: #f5e6c8;
            --text-primary: #f0e8d0;
            --text-secondary: #9a8f78;
            --card-bg: #1a1710;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-nav: 0 8px 40px rgba(0,0,0,0.6);
            --btn-bg: #FFA500;
            --gold: #FFA500;
            --navy: #4d6fff;
            --cat-bg: #1e1b12;
            --option-bg: #222017;
            --border-light: rgba(255,255,255,0.07);
            --grain-opacity: 0.05;
            --navbar-bg: rgba(22,19,13,0.97);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9998;
        }
        .top-nav {
            position: fixed; top: 12px; left: 12px; right: 12px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px;
            background: var(--navbar-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-nav);
            border: 1px solid var(--border-light);
            backdrop-filter: blur(16px);
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
        .nav-right { min-width: 40px; }
        .menu-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 10px; }
        .menu-btn img { width: 22px; height: 22px; }
        .nav-logo-img { height: 30px; width: auto; }
        .nav-brand { font-family: 'DM Serif Display', serif; font-size: 1.25rem; font-weight: 400; color: var(--navy); }
        body.dark .nav-brand { color: var(--gold); }
        .page-content { padding-top: 76px; padding-left: 14px; padding-right: 14px; }
        .sidebar {
            height:100%;width:0;position:fixed;top:0;left:0;background:var(--bg-sidebar);overflow-x:hidden;transition:0.3s;padding-top:0;z-index:2000;box-shadow:4px 0 40px rgba(0,0,0,0.15);border-right:1px solid var(--border-light);
        }
        .sidebar-user-header { padding:40px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;overflow:hidden;min-height:160px; }
        .sidebar-user-header.plan-free { background:linear-gradient(160deg,#1B2F5E 0%,#00008B 100%); }
        .sidebar-user-header.plan-zgju { background:linear-gradient(160deg,#1a1f3c 0%,#0d1130 100%);border-bottom:2px solid rgba(255,165,0,0.4); }
        .sidebar-user-header.plan-qeleme { background:linear-gradient(160deg,#0c0a06 0%,#1a1400 100%);border-bottom:2px solid rgba(255,215,0,0.5); }
        .sidebar-avatar { width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.3); }
        .sidebar-username { font-size:0.95rem;font-weight:600;color:#ffffff;text-align:center; }
        .sidebar-plan-badge { font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 12px;border-radius:20px; }
        .badge-free{background:rgba(255,255,255,0.15);color:#d0e0ff;}
        .badge-zgju{background:rgba(255,165,0,0.2);color:#FFA500;border:1px solid rgba(255,165,0,0.35);}
        .badge-qeleme{background:rgba(255,215,0,0.15);color:#FFD700;border:1px solid rgba(255,215,0,0.4);}
        .sidebar .closebtn { position:absolute;top:14px;right:18px;font-size:24px;color:rgba(255,255,255,0.7);padding:4px 8px !important;cursor:pointer;background:rgba(255,255,255,0.1);border-radius:8px;border:none; }
        .sidebar-nav-links { padding:8px 0; }
        .sidebar a { padding:13px 24px;text-decoration:none;font-size:0.9rem;font-weight:500;color:var(--sidebar-text);display:flex;align-items:center; }
        .sidebar a:hover{background:rgba(0,0,139,0.05);padding-left:30px;}
        .sidebar .logout{color:#e05555;margin-top:8px;border-top:1px solid var(--border-light);}
        .sidebar a img{filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;}
        body.dark .sidebar a img{filter:brightness(0) saturate(100%) invert(60%) sepia(100%) saturate(500%) hue-rotate(350deg) !important;}
        .menu-btn img{filter:brightness(0) saturate(100%) invert(9%) sepia(90%) saturate(3500%) hue-rotate(230deg) !important;}
        .account-container {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 26px 18px 30px;
            margin-top: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            position: relative;
        }
        .account-container::before { content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--gold)); }
        .account-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:26px; }
        .account-header h3 { font-family:'DM Serif Display',serif;margin:0;font-size:1.4rem;font-weight:400;text-align:center;flex:1; }
        .back-chevron { font-size:1.8rem;cursor:pointer;color:var(--text-primary);width:36px;opacity:0.5; }
        .back-chevron:hover{opacity:1;}
        .profile-pic-container{display:flex;flex-direction:column;align-items:center;margin-bottom:30px;}
        .profile-pic{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--card-bg);background:var(--cat-bg);}
        .section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border-light),transparent);margin:18px 0;}
        .section-label{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;opacity:0.35;margin-bottom:14px;display:block;}
        .account-field{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--cat-bg);border-radius:12px;border:1px solid var(--border-light);margin-bottom:8px;}
        .account-field label{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0.45;min-width:66px;}
        .account-field span{font-size:0.95rem;font-weight:500;flex:1;}
        .account-field input{background:transparent;border:none;outline:none;font-size:0.95rem;font-weight:500;color:var(--text-primary);flex:1;}
        .account-field.editable{background:var(--option-bg);}
        .update-btn{background:linear-gradient(135deg,var(--btn-bg),#0000c8);color:white;border:none;padding:12px 26px;border-radius:40px;cursor:pointer;margin-top:18px;width:100%;font-weight:600;}
        .update-btn:hover{transform:translateY(-2px);opacity:0.9;}
        .change-pw-btn{background:transparent;border:1.5px solid var(--btn-bg);color:var(--btn-bg);padding:9px 20px;border-radius:40px;cursor:pointer;font-weight:600;}
        .delete-account{color:#e05555;font-size:0.83rem;font-weight:600;cursor:pointer;border-bottom:1px solid transparent;}
        .delete-account:hover{border-bottom-color:#e05555;}
        .bottom-action-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:6px;}
        .custom-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:10000;}
        .modal-content{background:var(--card-bg);border-radius:22px;padding:26px 22px;width:90%;max-width:350px;text-align:center;}
        .modal-content input{width:100%;padding:10px 14px;margin:6px 0;border:1px solid var(--border-light);border-radius:30px;background:var(--option-bg);}
        .modal-buttons{display:flex;gap:10px;justify-content:center;margin-top:16px;}
        .modal-buttons button{padding:9px 22px;border-radius:30px;border:none;cursor:pointer;font-weight:600;}
        .modal-confirm{background:var(--btn-bg);color:white;}
        .modal-cancel{background:var(--option-bg);color:var(--text-primary);}
        @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
<div id="mySidebar" class="sidebar">
    <button class="closebtn" onclick="closeNav()">✕</button>
    <div id="sidebarUserHeader" class="sidebar-user-header plan-free">
        <img id="sidebarAvatar" class="sidebar-avatar" src="default-avatar.png" onerror="this.src='default-avatar.png'">
        <div class="sidebar-username" id="sidebarUsername">Student</div>
        <div class="sidebar-plan-badge badge-free" id="sidebarPlanBadge">Free</div>
    </div>
    <div class="sidebar-nav-links" id="sidebarLinks"></div>
    <a href="#" id="darkModeToggle" style="display:flex;align-items:center;">
        <img id="darkModeIcon" src="Moon.png" style="width:20px;height:20px;margin-right:12px;">
        <span id="darkModeText">Dark Mode</span>
    </a>
    <a href="#" class="logout" onclick="confirmLogout()" style="display:flex;align-items:center;">
        <img src="Logout.png" style="width:20px;height:20px;margin-right:12px;">
        Logout
    </a>
</div>
<div id="main" class="main">
    <nav class="top-nav">
        <div class="nav-left"><button class="menu-btn" onclick="openNav()"><img src="Menu.png"></button></div>
        <div class="nav-center"><img class="nav-logo-img" src="Bete_Fetena_Logo.png"><div class="nav-brand">Bete Fetena</div></div>
        <div class="nav-right"></div>
    </nav>
    <div class="page-content"><div id="dynamicContent" class="content-area"></div></div>
</div>
<script src="shared.js"></script>
<script>
    if (!checkAuth()) { /* will redirect */ }
    sessionStorage.setItem('currentPage', 'account.html');
    initDarkMode();
    buildSidebar('account');

    function populateSidebarHeader() {
        const data = getCurrentUserData();
        if (!data) return;
        const user = data.account, plan = user.plan || 'free';
        const name = user.name || 'Student', father = user.father ? ' ' + user.father.charAt(0) + '.' : '';
        const pic = user.profilePic || 'default-avatar.png';
        const header = document.getElementById('sidebarUserHeader');
        const avatar = document.getElementById('sidebarAvatar');
        const username = document.getElementById('sidebarUsername');
        const badge = document.getElementById('sidebarPlanBadge');
        if (avatar) { avatar.src = pic; avatar.onerror = () => { avatar.src = 'default-avatar.png'; }; }
        if (username) username.textContent = name + father;
        if (header) header.className = 'sidebar-user-header plan-' + plan;
        if (badge) {
            badge.className = 'sidebar-plan-badge badge-' + plan;
            badge.textContent = { free:'Free Plan', zgju:'Zgju Plan', qeleme:'✦ Qeleme Elite' }[plan] || 'Free Plan';
        }
    }
    populateSidebarHeader();

    function updateDarkModeToggleIcon() {
        const icon = document.getElementById('darkModeIcon'), text = document.getElementById('darkModeText');
        if (document.body.classList.contains('dark')) { icon.src = 'Sun.png'; text.textContent = 'Light Mode'; }
        else { icon.src = 'Moon.png'; text.textContent = 'Dark Mode'; }
    }
    const originalToggle = toggleDarkMode;
    toggleDarkMode = function() { originalToggle(); updateDarkModeToggleIcon(); };
    document.getElementById('darkModeToggle').addEventListener('click', e => { e.preventDefault(); toggleDarkMode(); });
    updateDarkModeToggleIcon();

    function maskPhone(phone) {
        if (!phone) return '';
        if (phone.length <= 6) return phone;
        return phone.substring(0, 4) + '•'.repeat(phone.length - 7) + phone.substring(phone.length - 3);
    }

    function renderAccount() {
        const data = getCurrentUserData();
        if (!data) { logout(); return; }
        const user = data.account, plan = user.plan || 'free';
        const displayName = (user.name && user.father) ? `${user.name} ${user.father}` : 'Not set';
        const maskedPhone = maskPhone(data.phone);
        const profilePic = user.profilePic || 'default-avatar.png';
        document.getElementById("dynamicContent").innerHTML = `
            <div class="account-container">
                <div class="account-header">
                    <span class="back-chevron" onclick="navigateTo('home.html')">‹</span>
                    <h3>Account</h3>
                    <span style="width:36px;"></span>
                </div>
                <div class="profile-pic-container">
                    <img id="profileImg" class="profile-pic" src="${profilePic}" onerror="this.src='default-avatar.png'">
                </div>
                <span class="section-label">Account Details</span>
                <div class="account-field"><label>Phone</label><span>${maskedPhone}</span></div>
                <div class="account-field"><label>Name</label><span>${displayName}</span></div>
                <div class="account-field"><label>Plan</label><span>${plan === 'free' ? 'Free' : plan === 'zgju' ? 'Zgju' : 'Qeleme'}</span></div>
                <div class="section-divider"></div>
                <div class="bottom-action-row">
                    <button class="change-pw-btn" onclick="renderPasswordChangeMode()">Change Password</button>
                    <span class="delete-account" onclick="confirmDeleteAccount()">⚠ Delete Account</span>
                </div>
            </div>`;
    }

    function renderPasswordChangeMode() {
        const data = getCurrentUserData();
        if (!data) { logout(); return; }
        document.getElementById("dynamicContent").innerHTML = `
            <div class="account-container">
                <div class="account-header"><span class="back-chevron" onclick="renderAccount()">‹</span><h3>Change Password</h3><span style="width:36px;"></span></div>
                <div class="account-field editable"><label>Old</label><input type="password" id="oldPw" placeholder="Current password" maxlength="6"></div>
                <div class="account-field editable"><label>New</label><input type="password" id="newPw" placeholder="New 6-digit password" maxlength="6"></div>
                <div class="account-field editable"><label>Confirm</label><input type="password" id="confirmPw" placeholder="Confirm new password" maxlength="6"></div>
                <button class="update-btn" id="updatePwBtn">Update Password</button>
            </div>`;
        document.getElementById('updatePwBtn').onclick = () => {
            const oldPw = document.getElementById('oldPw').value.trim();
            const newPw = document.getElementById('newPw').value.trim();
            const confirmPw = document.getElementById('confirmPw').value.trim();
            if (!oldPw || !newPw || !confirmPw) { showMessageModal("Fill all fields."); return; }
            if (!/^\d{6}$/.test(newPw)) { showMessageModal("Password must be 6 digits."); return; }
            if (newPw !== confirmPw) { showMessageModal("Passwords don't match."); return; }
            let users = JSON.parse(localStorage.getItem('users') || '{}');
            let phoneData = users[data.phone];
            if (!phoneData) { showMessageModal("User not found"); return; }
            const accountIndex = phoneData.accounts.findIndex(acc => acc.accountId === data.account.accountId);
            if (accountIndex === -1) { showMessageModal("Account not found"); return; }
            if (phoneData.accounts[accountIndex].password !== oldPw) { showMessageModal("Old password incorrect."); return; }
            if (oldPw === newPw) { showMessageModal("New password cannot be same as old."); return; }
            phoneData.accounts[accountIndex].password = newPw;
            users[data.phone] = phoneData;
            localStorage.setItem('users', JSON.stringify(users));
            showMessageModal("Password changed. Log in again.", () => logout());
        };
    }

    function confirmDeleteAccount() {
        showConfirmModal("Are you sure you want to delete this account? This action cannot be undone.", () => {
            const data = getCurrentUserData();
            if (!data) return;
            let users = JSON.parse(localStorage.getItem('users') || '{}');
            let phoneData = users[data.phone];
            if (!phoneData) return;
            const accountIndex = phoneData.accounts.findIndex(acc => acc.accountId === data.account.accountId);
            if (accountIndex === -1) return;
            phoneData.accounts.splice(accountIndex, 1);
            if (phoneData.accounts.length === 0) {
                delete users[data.phone];
                localStorage.setItem('users', JSON.stringify(users));
                logout();
            } else {
                users[data.phone] = phoneData;
                localStorage.setItem('users', JSON.stringify(users));
                if (phoneData.accounts.length > 0) {
                    sessionStorage.setItem('currentAccountId', phoneData.accounts[0].accountId);
                }
                logout();
            }
        });
    }

    renderAccount();
</script>
</body>
</html>
